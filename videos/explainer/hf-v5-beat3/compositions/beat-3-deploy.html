<template id="beat3-deploy-template">
  <div
    data-composition-id="beat3-deploy"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="8.5"
  >
    <style>
      [data-composition-id="beat3-deploy"] {
        font-family: "Inter", "Montserrat", sans-serif;
        background: #0a0f1a;
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
      }
      [data-composition-id="beat3-deploy"] .flow-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        opacity: 0.45;
      }
      [data-composition-id="beat3-deploy"] .flow-bg path {
        fill: none;
        stroke: #4fa0b4;
        stroke-width: 1.5;
      }
      [data-composition-id="beat3-deploy"] .grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(6, 182, 212, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(6, 182, 212, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 1;
      }
      [data-composition-id="beat3-deploy"] .radial-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1200px;
        height: 1200px;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.12) 0%,
          transparent 55%
        );
        z-index: 1;
      }
      [data-composition-id="beat3-deploy"] .particle-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        z-index: 2;
      }

      /* Tool logos grid */
      [data-composition-id="beat3-deploy"] .tools-grid {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 5;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        width: 900px;
      }
      [data-composition-id="beat3-deploy"] .tool-card {
        background: rgba(17, 24, 39, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        padding: 20px 24px;
        display: flex;
        align-items: center;
        gap: 14px;
        opacity: 0;
        box-shadow: 0 0 20px rgba(6, 182, 212, 0.05);
      }
      [data-composition-id="beat3-deploy"] .tool-icon {
        font-size: 28px;
        min-width: 40px;
        text-align: center;
      }
      [data-composition-id="beat3-deploy"] .tool-name {
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 16px;
        color: #ffffff;
      }
      [data-composition-id="beat3-deploy"] .tool-live {
        margin-left: auto;
        background: rgba(16, 185, 129, 0.15);
        border: 1px solid rgba(16, 185, 129, 0.3);
        color: #34d399;
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 5px;
        opacity: 0;
      }
      [data-composition-id="beat3-deploy"] .live-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #10b981;
      }

      /* No rip-and-replace banner */
      [data-composition-id="beat3-deploy"] .banner {
        position: absolute;
        bottom: 120px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        display: flex;
        gap: 0.4em;
      }
      [data-composition-id="beat3-deploy"] .banner-word {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 32px;
        color: #ffffff;
        display: inline-block;
        opacity: 0;
      }
      [data-composition-id="beat3-deploy"] .banner-word.accent {
        color: #22d3ee;
      }

      /* Go live timeline */
      [data-composition-id="beat3-deploy"] .timeline {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 22px;
        color: #94a3b8;
        opacity: 0;
      }
      [data-composition-id="beat3-deploy"] .timeline .highlight {
        color: #22d3ee;
        font-weight: 700;
      }

      /* Subtitle */
      [data-composition-id="beat3-deploy"] .subtitle {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-family: "Inter", sans-serif;
        font-weight: 500;
        font-size: 24px;
        color: #ffffff;
        text-align: center;
        opacity: 0;
        background: rgba(10, 15, 26, 0.75);
        padding: 6px 18px;
        border-radius: 6px;
        max-width: 1600px;
      }
    </style>

    <svg
      class="flow-bg"
      viewBox="0 0 1920 1080"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M0 200 Q 240 120, 480 200 T 960 200 T 1440 200 T 1920 200"
        opacity="0.3"
      />
      <path
        d="M0 400 Q 300 330, 600 400 T 1200 400 T 1920 400"
        opacity="0.35"
      />
      <path
        d="M0 600 Q 200 540, 400 600 T 800 600 T 1200 600 T 1920 600"
        opacity="0.25"
      />
      <path d="M0 800 Q 360 730, 720 800 T 1440 800 T 1920 800" opacity="0.3" />
    </svg>
    <div class="grid-overlay"></div>
    <div class="radial-glow"></div>
    <canvas
      class="particle-canvas"
      id="beat3-canvas"
      width="1920"
      height="1080"
    ></canvas>

    <div class="tools-grid">
      <div class="tool-card" id="tool1">
        <span class="tool-icon">&#x1F4E8;</span
        ><span class="tool-name">Slack</span
        ><span class="tool-live" id="live1"
          ><span class="live-dot"></span>LIVE</span
        >
      </div>
      <div class="tool-card" id="tool2">
        <span class="tool-icon">&#x1F4CA;</span
        ><span class="tool-name">HubSpot</span
        ><span class="tool-live" id="live2"
          ><span class="live-dot"></span>LIVE</span
        >
      </div>
      <div class="tool-card" id="tool3">
        <span class="tool-icon">&#x1F4F1;</span
        ><span class="tool-name">Telegram</span
        ><span class="tool-live" id="live3"
          ><span class="live-dot"></span>LIVE</span
        >
      </div>
      <div class="tool-card" id="tool4">
        <span class="tool-icon">&#x1F4D3;</span
        ><span class="tool-name">Notion</span
        ><span class="tool-live" id="live4"
          ><span class="live-dot"></span>LIVE</span
        >
      </div>
      <div class="tool-card" id="tool5">
        <span class="tool-icon">&#x1F4E7;</span
        ><span class="tool-name">Gmail</span
        ><span class="tool-live" id="live5"
          ><span class="live-dot"></span>LIVE</span
        >
      </div>
      <div class="tool-card" id="tool6">
        <span class="tool-icon">&#x26A1;</span
        ><span class="tool-name">+50 more</span
        ><span class="tool-live" id="live6"
          ><span class="live-dot"></span>LIVE</span
        >
      </div>
    </div>

    <div class="banner" id="banner">
      <span class="banner-word">No</span>
      <span class="banner-word accent">rip-and-replace.</span>
    </div>

    <div class="timeline" id="timeline">
      Go live in <span class="highlight">2–4 weeks</span>
    </div>

    <div class="subtitle" id="subtitle"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var beat = 8.5;

      // Canvas 2D — forming network
      var canvas = document.getElementById("beat3-canvas");
      var ctx = canvas.getContext("2d");
      var proxy = { t: 0 };
      function hash(x, y) {
        var n = x * 374761393 + y * 668265263;
        n = (n ^ (n >> 13)) * 1274126177;
        return ((n ^ (n >> 16)) & 0x7fffffff) / 0x7fffffff;
      }
      function drawNetwork(time) {
        ctx.clearRect(0, 0, 1920, 1080);
        var nodes = 70,
          positions = [];
        for (var i = 0; i < nodes; i++) {
          var bx = hash(i, 0) * 1920,
            by = hash(i, 1) * 1080;
          var dx = Math.sin(time * 0.2 + i * 1.3) * 18,
            dy = Math.cos(time * 0.15 + i * 0.9) * 14;
          var x = bx + dx,
            y = by + dy;
          positions.push({ x: x, y: y });
          var alpha = 0.25 + hash(i, 2) * 0.4,
            r = 2 + hash(i, 3) * 2;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(6, 182, 212, " + alpha + ")";
          ctx.fill();
          ctx.beginPath();
          ctx.arc(x, y, r * 2, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(6, 182, 212, " + alpha * 0.15 + ")";
          ctx.fill();
        }
        for (var i = 0; i < nodes; i++) {
          for (var j = i + 1; j < nodes; j++) {
            var dist = Math.sqrt(
              Math.pow(positions[i].x - positions[j].x, 2) +
                Math.pow(positions[i].y - positions[j].y, 2),
            );
            if (dist < 170) {
              var lineAlpha = (1 - dist / 170) * 0.1;
              ctx.beginPath();
              ctx.moveTo(positions[i].x, positions[i].y);
              ctx.lineTo(positions[j].x, positions[j].y);
              ctx.strokeStyle = "rgba(6, 182, 212, " + lineAlpha + ")";
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }
      }
      tl.to(
        proxy,
        {
          t: beat,
          duration: beat,
          ease: "none",
          onUpdate: function () {
            drawNetwork(proxy.t);
          },
        },
        0,
      );

      // Flow
      var flowPaths = document.querySelectorAll(
        "[data-composition-id='beat3-deploy'] .flow-bg path",
      );
      flowPaths.forEach(function (path, i) {
        tl.fromTo(
          path,
          { strokeDasharray: 2500, strokeDashoffset: 2500 },
          { strokeDashoffset: 0, duration: 5, ease: "none" },
          i * 0.2,
        );
      });

      // Tool cards cascade
      var tools = ["#tool1", "#tool2", "#tool3", "#tool4", "#tool5", "#tool6"];
      tools.forEach(function (tool, i) {
        tl.fromTo(
          tool,
          { opacity: 0, y: 40, scale: 0.95 },
          { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "expo.out" },
          0.3 + i * 0.2,
        );
        var liveId = "#live" + (i + 1);
        tl.fromTo(
          liveId,
          { opacity: 0, scale: 0.5 },
          { opacity: 1, scale: 1, duration: 0.3, ease: "back.out(2)" },
          0.6 + i * 0.2,
        );
      });

      // Banner
      var bannerWords = document.querySelectorAll(
        "[data-composition-id='beat3-deploy'] .banner-word",
      );
      bannerWords.forEach(function (word, i) {
        tl.fromTo(
          word,
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" },
          4.0 + i * 0.25,
        );
      });

      // Timeline
      tl.fromTo(
        "#timeline",
        { opacity: 0, y: 15 },
        { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" },
        5.0,
      );

      // Subtitles
      var subs = [
        {
          start: 0,
          end: 3,
          text: "Your agents plug into Slack, HubSpot, Telegram, Notion",
        },
        { start: 3, end: 5.5, text: "and 50 more tools you already use" },
        {
          start: 5.5,
          end: 8.5,
          text: "No rip-and-replace. Go live in 2 to 4 weeks.",
        },
      ];
      subs.forEach(function (sub) {
        tl.call(
          function () {
            (document.getElementById("subtitle") || {}).textContent = sub.text;
          },
          [],
          sub.start,
        );
        tl.fromTo(
          "#subtitle",
          { opacity: 0 },
          { opacity: 0.9, duration: 0.2 },
          sub.start,
        );
        tl.to("#subtitle", { opacity: 0, duration: 0.2 }, sub.end - 0.2);
      });
      tl.call(
        function () {
          (document.getElementById("subtitle") || {}).textContent = "";
        },
        [],
        beat - 0.5,
      );

      window.__timelines["beat3-deploy"] = tl;
    </script>
  </div>
</template>
