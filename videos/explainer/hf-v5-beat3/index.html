<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8.5"
    >
      <div
        id="scene1"
        class="scene"
        data-composition-id="beat-3-deploy"
        data-composition-src="compositions/beat-3-deploy.html"
        data-start="0"
        data-duration="8.5"
        data-track-index="1"
      ></div>
      <audio
        id="narration"
        src="assets/mixed-audio-v5.wav"
        data-start="0"
        data-duration="8.5"
        data-track-index="0"
        data-volume="1"
      ></audio>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
