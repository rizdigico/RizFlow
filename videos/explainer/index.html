<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #scene1 {
        z-index: 1;
      }
      #scene2 {
        z-index: 2;
        opacity: 0;
      }
      #scene3 {
        z-index: 3;
        opacity: 0;
      }
      #scene4 {
        z-index: 4;
        opacity: 0;
      }
      #scene5 {
        z-index: 5;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="46"
    >
      <!-- Beat 1: THE PROBLEM (0.00 - 9.50s) -->
      <div
        id="scene1"
        class="scene"
        data-composition-id="beat1-problem"
        data-composition-src="compositions/beat-1-problem.html"
        data-start="0"
        data-duration="9.5"
        data-track-index="1"
      ></div>

      <!-- Beat 2: DISCOVER (9.50 - 18.00s) -->
      <div
        id="scene2"
        class="scene"
        data-composition-id="beat2-discover"
        data-composition-src="compositions/beat-2-discover.html"
        data-start="9.5"
        data-duration="8.5"
        data-track-index="1"
      ></div>

      <!-- Beat 3: BUILD & DEPLOY (18.00 - 26.50s) -->
      <div
        id="scene3"
        class="scene"
        data-composition-id="beat3-deploy"
        data-composition-src="compositions/beat-3-deploy.html"
        data-start="18.0"
        data-duration="8.5"
        data-track-index="1"
      ></div>

      <!-- Beat 4: SCALE/IMPACT (26.50 - 38.00s) -->
      <div
        id="scene4"
        class="scene"
        data-composition-id="beat4-scale"
        data-composition-src="compositions/beat-4-scale.html"
        data-start="26.5"
        data-duration="11.5"
        data-track-index="1"
      ></div>

      <!-- Beat 5: CTA (38.00 - 45.60s) -->
      <div
        id="scene5"
        class="scene"
        data-composition-id="beat5-cta"
        data-composition-src="compositions/beat-5-cta.html"
        data-start="38.0"
        data-duration="7.6"
        data-track-index="1"
      ></div>

      <!-- Narration audio -->
      <audio
        id="narration"
        src="mixed-audio-v3.wav"
        data-start="0"
        data-duration="46"
        data-track-index="0"
        data-volume="1"
      ></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var total = 46;

      // Transition 1→2: Blur crossfade at 9.2s
      var t1 = 9.2;
      tl.to(
        "#scene1",
        { filter: "blur(20px)", opacity: 0, duration: 0.3, ease: "power3.in" },
        t1,
      );
      tl.fromTo(
        "#scene2",
        { opacity: 0, filter: "blur(20px)", scale: 0.75 },
        {
          opacity: 1,
          filter: "blur(0px)",
          scale: 1,
          duration: 0.5,
          ease: "expo.out",
        },
        t1 + 0.1,
      );

      // Transition 2→3: Velocity-matched upward slide at 17.7s
      var t2 = 17.7;
      tl.to(
        "#scene2",
        {
          y: -150,
          filter: "blur(30px)",
          opacity: 0,
          duration: 0.33,
          ease: "power2.in",
        },
        t2,
      );
      tl.fromTo(
        "#scene3",
        { y: 150, filter: "blur(30px)", opacity: 0 },
        {
          y: 0,
          filter: "blur(0px)",
          opacity: 1,
          duration: 1.0,
          ease: "power2.out",
        },
        t2,
      );

      // Transition 3→4: Whip pan left at 26.2s
      var t3 = 26.2;
      tl.to(
        "#scene3",
        {
          x: -400,
          filter: "blur(24px)",
          opacity: 0.4,
          duration: 0.3,
          ease: "power3.in",
        },
        t3,
      );
      tl.fromTo(
        "#scene4",
        { x: 400, filter: "blur(24px)", opacity: 0 },
        {
          x: 0,
          filter: "blur(0px)",
          opacity: 1,
          duration: 0.3,
          ease: "power3.out",
        },
        t3 + 0.15,
      );

      // Transition 4→5: Zoom through at 37.7s
      var t4 = 37.7;
      tl.to(
        "#scene4",
        {
          scale: 1.2,
          filter: "blur(20px)",
          opacity: 0,
          duration: 0.4,
          ease: "power3.in",
        },
        t4,
      );
      tl.fromTo(
        "#scene5",
        { scale: 0.9, opacity: 0, filter: "blur(10px)" },
        {
          scale: 1,
          opacity: 1,
          filter: "blur(0px)",
          duration: 0.6,
          ease: "power2.inOut",
        },
        t4 + 0.1,
      );

      // Hard kills for deterministic rendering
      tl.set("#scene1", { visibility: "hidden" }, 9.7);
      tl.set("#scene2", { visibility: "hidden" }, 18.2);
      tl.set("#scene3", { visibility: "hidden" }, 26.7);
      tl.set("#scene4", { visibility: "hidden" }, 38.2);
      tl.set("#scene5", { visibility: "hidden" }, 46);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
