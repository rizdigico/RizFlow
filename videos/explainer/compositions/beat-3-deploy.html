    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var beat = 6.82;

      // Agent circles scale in (staggered)
      var agents = [".agent-1", ".agent-2", ".agent-3", ".agent-4"];
      agents.forEach(function (agent, i) {
        tl.fromTo(
          agent,
          { opacity: 0, scale: 0.3 },
          { opacity: 1, scale: 1, duration: 0.4, ease: "elastic.out(1, 0.6)" },
          0.3 + i * 0.12,
        );
      });

      // Tool nodes slide in from right (staggered)
      var tools = [".tool-1", ".tool-2", ".tool-3", ".tool-4", ".tool-5"];
      tools.forEach(function (tool, i) {
        tl.fromTo(
          tool,
          { opacity: 0, x: 60 },
          { opacity: 1, x: 0, duration: 0.35, ease: "power2.out" },
          0.6 + i * 0.1,
        );
      });

      // Connection paths draw themselves (staggered)
      var paths = [
        "#path-a1",
        "#path-a2",
        "#path-a3",
        "#path-a4",
        "#path-t1",
        "#path-t2",
        "#path-t3",
        "#path-t4",
        "#path-t5",
      ];
      paths.forEach(function (path, i) {
        tl.to(
          path,
          { strokeDashoffset: 0, duration: 0.7, ease: "power2.out" },
          0.8 + i * 0.15,
        );
      });

      // Live badges pop in after tool logos
      var liveBadges = [
        ".tool-1 .live-badge",
        ".tool-2 .live-badge",
        ".tool-3 .live-badge",
        ".tool-4 .live-badge",
        ".tool-5 .live-badge",
      ];
      liveBadges.forEach(function (badge, i) {
        tl.fromTo(
          badge,
          { opacity: 0, scale: 0.5 },
          { opacity: 1, scale: 1, duration: 0.25, ease: "back.out(2)" },
          1.0 + i * 0.12,
        );
      });

      // Bottom text — per-word kinetic typography
      var words = document.querySelectorAll(
        "[data-composition-id='beat3-deploy'] .bottom-word",
      );
      words.forEach(function (word, i) {
        tl.fromTo(
          word,
          { opacity: 0, y: 20, x: 15 },
          { opacity: 1, y: 0, x: 0, duration: 0.35, ease: "power2.out" },
          3.5 + i * 0.18,
        );
      });

      // Agent circles subtle float
      agents.forEach(function (agent, i) {
        tl.to(
          agent,
          {
            y: "+=4",
            duration: 1.8 + i * 0.2,
            yoyo: true,
            repeat: 2,
            ease: "sine.inOut",
          },
          1.5,
        );
      });

      // Agent circles glow pulse
      agents.forEach(function (agent, i) {
        tl.to(
          agent + " .agent-circle",
          {
            boxShadow: "0 0 25px rgba(6,182,212,0.3)",
            duration: 1.2,
            yoyo: true,
            repeat: 3,
            ease: "sine.inOut",
          },
          1.2 + i * 0.3,
        );
      });

      window.__timelines["beat3-deploy"] = tl;
    </script>
