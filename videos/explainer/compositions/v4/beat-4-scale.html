<template id="beat4-scale-template">
  <div
    data-composition-id="beat4-scale"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="12"
  >
    <style>
      [data-composition-id="beat4-scale"] {
        font-family: "Inter", "Montserrat", sans-serif;
        background: #0a0f1a;
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
      }
      /* ENHANCED: Much stronger flow */
      [data-composition-id="beat4-scale"] .flow-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        opacity: 0.5;
      }
      [data-composition-id="beat4-scale"] .flow-bg path {
        fill: none;
        stroke: #4fa0b4;
        stroke-width: 2;
      }
      [data-composition-id="beat4-scale"] .grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 1;
      }
      [data-composition-id="beat4-scale"] .radial-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1400px;
        height: 1400px;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.15) 0%,
          transparent 55%
        );
        z-index: 1;
      }
      [data-composition-id="beat4-scale"] .particle-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        z-index: 2;
      }

      /* Metric cards — ZOOM emphasis layout */
      [data-composition-id="beat4-scale"] .metrics-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        gap: 32px;
        z-index: 4;
        width: 1100px;
      }
      [data-composition-id="beat4-scale"] .metric-card {
        display: flex;
        align-items: center;
        gap: 30px;
        background: rgba(17, 24, 39, 0.7);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        padding: 28px 36px;
        box-shadow:
          0 0 40px rgba(6, 182, 212, 0.1),
          0 0 80px rgba(6, 182, 212, 0.04);
        opacity: 0;
      }
      [data-composition-id="beat4-scale"] .metric-icon {
        font-size: 36px;
        min-width: 50px;
        text-align: center;
      }
      [data-composition-id="beat4-scale"] .metric-value {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 80px;
        color: #ffffff;
        min-width: 180px;
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }
      [data-composition-id="beat4-scale"] .metric-value .pct {
        font-size: 44px;
        color: #22d3ee;
      }
      [data-composition-id="beat4-scale"] .metric-value .unit {
        font-size: 28px;
        color: #94a3b8;
        font-weight: 600;
      }
      [data-composition-id="beat4-scale"] .metric-info {
        flex: 1;
      }
      [data-composition-id="beat4-scale"] .metric-label {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 20px;
        color: #ffffff;
        margin-bottom: 6px;
        letter-spacing: 0.04em;
      }
      [data-composition-id="beat4-scale"] .metric-desc {
        font-family: "Inter", sans-serif;
        font-weight: 400;
        font-size: 14px;
        color: #94a3b8;
        line-height: 1.4;
      }
      [data-composition-id="beat4-scale"] .metric-bar-track {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 4px;
        margin-top: 10px;
        overflow: hidden;
      }
      [data-composition-id="beat4-scale"] .metric-bar-fill {
        height: 100%;
        border-radius: 4px;
        transform-origin: left center;
        transform: scaleX(0);
        position: relative;
      }
      .bar-teal {
        background: linear-gradient(90deg, #06b6d4, #22d3ee);
      }
      .bar-emerald {
        background: linear-gradient(90deg, #10b981, #34d399);
      }
      .bar-gold {
        background: linear-gradient(90deg, #f59e0b, #fbbf24);
      }

      /* PHONE ICONS SECTION — motion graphics */
      [data-composition-id="beat4-scale"] .phone-section {
        position: absolute;
        top: 50%;
        right: 60px;
        transform: translateY(-50%);
        z-index: 5;
        opacity: 0;
      }
      [data-composition-id="beat4-scale"] .phone-mockup {
        width: 260px;
        height: 480px;
        background: rgba(17, 24, 39, 0.9);
        border: 2px solid rgba(6, 182, 212, 0.2);
        border-radius: 36px;
        padding: 16px;
        position: relative;
        box-shadow:
          0 0 60px rgba(6, 182, 212, 0.15),
          inset 0 0 20px rgba(6, 182, 212, 0.05);
      }
      [data-composition-id="beat4-scale"] .phone-notch {
        width: 80px;
        height: 6px;
        background: rgba(6, 182, 212, 0.3);
        border-radius: 3px;
        margin: 0 auto 16px;
      }
      [data-composition-id="beat4-scale"] .phone-screen {
        width: 100%;
        height: calc(100% - 30px);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      [data-composition-id="beat4-scale"] .phone-notif {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        opacity: 0;
      }
      [data-composition-id="beat4-scale"] .notif-icon {
        font-size: 18px;
      }
      [data-composition-id="beat4-scale"] .notif-text {
        font-family: "Inter", sans-serif;
        font-weight: 500;
        font-size: 11px;
        color: #e2e8f0;
      }
      [data-composition-id="beat4-scale"] .notif-time {
        margin-left: auto;
        font-family: "Inter", sans-serif;
        font-weight: 400;
        font-size: 9px;
        color: #64748b;
      }
      [data-composition-id="beat4-scale"] .notif-badge {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #10b981;
        flex-shrink: 0;
      }

      /* Floating app icons around phone */
      [data-composition-id="beat4-scale"] .app-icon {
        position: absolute;
        width: 56px;
        height: 56px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        opacity: 0;
        z-index: 6;
      }
      [data-composition-id="beat4-scale"] .icon-telegram {
        top: -20px;
        right: -40px;
        background: linear-gradient(135deg, #0088cc, #229ed9);
        box-shadow: 0 0 20px rgba(0, 136, 204, 0.4);
      }
      [data-composition-id="beat4-scale"] .icon-whatsapp {
        top: 120px;
        right: -50px;
        background: linear-gradient(135deg, #25d366, #128c7e);
        box-shadow: 0 0 20px rgba(37, 211, 102, 0.4);
      }
      [data-composition-id="beat4-scale"] .icon-slack {
        bottom: 120px;
        right: -45px;
        background: linear-gradient(135deg, #4a154b, #e01e5a);
        box-shadow: 0 0 20px rgba(224, 30, 90, 0.3);
      }
      [data-composition-id="beat4-scale"] .icon-email {
        bottom: -10px;
        right: -35px;
        background: linear-gradient(135deg, #06b6d4, #22d3ee);
        box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
      }

      /* Subtitle */
      [data-composition-id="beat4-scale"] .subtitle {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-family: "Inter", sans-serif;
        font-weight: 500;
        font-size: 24px;
        color: #ffffff;
        text-align: center;
        opacity: 0;
        background: rgba(10, 15, 26, 0.75);
        padding: 6px 18px;
        border-radius: 6px;
        max-width: 1600px;
      }

      /* Impact flash overlays */
      [data-composition-id="beat4-scale"] .impact-flash {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.08) 0%,
          transparent 60%
        );
        z-index: 3;
        opacity: 0;
      }
    </style>

    <svg
      class="flow-bg"
      viewBox="0 0 1920 1080"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M0 150 Q 240 80, 480 150 T 960 150 T 1440 150 T 1920 150"
        opacity="0.35"
      />
      <path d="M0 340 Q 300 270, 600 340 T 1200 340 T 1920 340" opacity="0.4" />
      <path
        d="M0 520 Q 200 450, 400 520 T 800 520 T 1200 520 T 1920 520"
        opacity="0.3"
      />
      <path d="M0 700 Q 360 630, 720 700 T 1440 700 T 1920 700" opacity="0.4" />
      <path
        d="M0 880 Q 280 810, 560 880 T 1120 880 T 1920 880"
        opacity="0.25"
      />
    </svg>
    <div class="grid-overlay"></div>
    <div class="radial-glow"></div>
    <canvas
      class="particle-canvas"
      id="beat4-canvas"
      width="1920"
      height="1080"
    ></canvas>
    <div class="impact-flash" id="impact-flash"></div>

    <!-- Metrics -->
    <div class="metrics-container" id="metrics">
      <div class="metric-card" id="metric-1">
        <div class="metric-icon">&#x1F4B0;</div>
        <div class="metric-value">
          <span id="counter-1">0</span><span class="pct">%</span>
        </div>
        <div class="metric-info">
          <div class="metric-label">Operating Costs Cut</div>
          <div class="metric-desc">
            AI agents handle admin, comms, billing — 24/7
          </div>
          <div class="metric-bar-track">
            <div class="metric-bar-fill bar-teal" id="bar-1"></div>
          </div>
        </div>
      </div>
      <div class="metric-card" id="metric-2">
        <div class="metric-icon">&#x23F1;</div>
        <div class="metric-value">
          <span id="counter-2">0</span><span class="unit">+ hrs</span>
        </div>
        <div class="metric-info">
          <div class="metric-label">Weekly Hours Reclaimed</div>
          <div class="metric-desc">Reclaim your time, every week</div>
          <div class="metric-bar-track">
            <div class="metric-bar-fill bar-emerald" id="bar-2"></div>
          </div>
        </div>
      </div>
      <div class="metric-card" id="metric-3">
        <div class="metric-icon">&#x1F4C8;</div>
        <div class="metric-value">
          <span id="counter-3">0</span><span class="pct">%</span>
        </div>
        <div class="metric-info">
          <div class="metric-label">Revenue Growth</div>
          <div class="metric-desc">Scale your business, not your workload</div>
          <div class="metric-bar-track">
            <div class="metric-bar-fill bar-gold" id="bar-3"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Phone mockup with app icons -->
    <div class="phone-section" id="phone-section">
      <div class="phone-mockup">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <div class="phone-notif" id="notif1">
            <div class="notif-badge"></div>
            <div class="notif-icon">&#x1F4F1;</div>
            <div class="notif-text">3 tasks completed</div>
            <div class="notif-time">2m</div>
          </div>
          <div class="phone-notif" id="notif2">
            <div class="notif-badge"></div>
            <div class="notif-icon">&#x1F4B5;</div>
            <div class="notif-text">Invoice #247 sent</div>
            <div class="notif-time">5m</div>
          </div>
          <div class="phone-notif" id="notif3">
            <div class="notif-badge"></div>
            <div class="notif-icon">&#x1F4CA;</div>
            <div class="notif-text">Revenue up 40%</div>
            <div class="notif-time">12m</div>
          </div>
          <div class="phone-notif" id="notif4">
            <div class="notif-badge"></div>
            <div class="notif-icon">&#x2705;</div>
            <div class="notif-text">All agents running</div>
            <div class="notif-time">28m</div>
          </div>
        </div>
      </div>
      <!-- Floating app icons -->
      <div class="app-icon icon-telegram" id="icon-tg">&#x2708;&#xFE0F;</div>
      <div class="app-icon icon-whatsapp" id="icon-wa">&#x1F4AC;</div>
      <div class="app-icon icon-slack" id="icon-sl">&#x2318;</div>
      <div class="app-icon icon-email" id="icon-em">&#x2709;&#xFE0F;</div>
    </div>

    <div class="subtitle" id="subtitle"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var beat = 12;

      // Canvas — bright neural network
      var canvas4 = document.getElementById("beat4-canvas");
      var ctx4 = canvas4.getContext("2d");
      var proxy4 = { t: 0 };
      function hash(x, y) {
        var n = x * 374761393 + y * 668265263;
        n = (n ^ (n >> 13)) * 1274126177;
        return ((n ^ (n >> 16)) & 0x7fffffff) / 0x7fffffff;
      }
      function drawNetwork(time) {
        ctx4.clearRect(0, 0, 1920, 1080);
        var nodes = 90,
          positions = [];
        for (var i = 0; i < nodes; i++) {
          var bx = hash(i, 0) * 1920,
            by = hash(i, 1) * 1080;
          var dx = Math.sin(time * 0.25 + i * 1.3) * 22,
            dy = Math.cos(time * 0.18 + i * 0.9) * 16;
          var x = bx + dx,
            y = by + dy;
          positions.push({ x: x, y: y });
          var alpha = 0.35 + hash(i, 2) * 0.4,
            r = 2.5 + hash(i, 3) * 2.5;
          ctx4.beginPath();
          ctx4.arc(x, y, r, 0, Math.PI * 2);
          ctx4.fillStyle = "rgba(6, 182, 212, " + alpha + ")";
          ctx4.fill();
          ctx4.beginPath();
          ctx4.arc(x, y, r * 2.5, 0, Math.PI * 2);
          ctx4.fillStyle = "rgba(6, 182, 212, " + alpha * 0.15 + ")";
          ctx4.fill();
        }
        for (var i = 0; i < nodes; i++) {
          for (var j = i + 1; j < nodes; j++) {
            var dist = Math.sqrt(
              Math.pow(positions[i].x - positions[j].x, 2) +
                Math.pow(positions[i].y - positions[j].y, 2),
            );
            if (dist < 190) {
              var lineAlpha = (1 - dist / 190) * 0.15;
              ctx4.beginPath();
              ctx4.moveTo(positions[i].x, positions[i].y);
              ctx4.lineTo(positions[j].x, positions[j].y);
              ctx4.strokeStyle = "rgba(6, 182, 212, " + lineAlpha + ")";
              ctx4.lineWidth = 0.7;
              ctx4.stroke();
            }
          }
        }
      }
      tl.to(
        proxy4,
        {
          t: beat,
          duration: beat,
          ease: "none",
          onUpdate: function () {
            drawNetwork(proxy4.t);
          },
        },
        0,
      );

      // Enhanced flow
      var flowPaths = document.querySelectorAll(
        "[data-composition-id='beat4-scale'] .flow-bg path",
      );
      flowPaths.forEach(function (path, i) {
        tl.fromTo(
          path,
          { strokeDasharray: 3000, strokeDashoffset: 3000 },
          { strokeDashoffset: 0, duration: 6, ease: "none" },
          i * 0.2,
        );
      });

      // Metric cards cascade — ZOOM emphasis on each
      var cards = ["#metric-1", "#metric-2", "#metric-3"];
      cards.forEach(function (card, i) {
        tl.fromTo(
          card,
          { opacity: 0, y: 50, scale: 0.9 },
          { opacity: 1, y: 0, scale: 1, duration: 0.7, ease: "expo.out" },
          0.3 + i * 0.5,
        );
      });

      // COUNTER 1: 60% — ZOOM emphasis
      var c1 = { val: 0 };
      tl.to(
        c1,
        {
          val: 60,
          duration: 2,
          ease: "power2.out",
          onUpdate: function () {
            (document.getElementById("counter-1") || {}).textContent =
              Math.round(c1.val);
          },
        },
        0.6,
      );
      tl.to(
        "#bar-1",
        { scaleX: 0.6, duration: 2.5, ease: "cubic-bezier(0.16, 1, 0.3, 1)" },
        0.6,
      );
      // ZOOM: Card scales up then back
      tl.fromTo(
        "#metric-1",
        { scale: 1 },
        {
          scale: 1.08,
          duration: 0.3,
          ease: "power2.out",
          yoyo: true,
          repeat: 1,
        },
        2.5,
      );
      // Impact flash
      tl.fromTo(
        "#impact-flash",
        { opacity: 0.6 },
        { opacity: 0, duration: 0.4, ease: "power2.out" },
        2.5,
      );

      // COUNTER 2: 20+ hrs
      var c2 = { val: 0 };
      tl.to(
        c2,
        {
          val: 20,
          duration: 2,
          ease: "power2.out",
          onUpdate: function () {
            (document.getElementById("counter-2") || {}).textContent =
              Math.round(c2.val);
          },
        },
        1.0,
      );
      tl.to(
        "#bar-2",
        { scaleX: 0.8, duration: 2.5, ease: "cubic-bezier(0.16, 1, 0.3, 1)" },
        1.0,
      );
      // ZOOM emphasis
      tl.fromTo(
        "#metric-2",
        { scale: 1 },
        {
          scale: 1.08,
          duration: 0.3,
          ease: "power2.out",
          yoyo: true,
          repeat: 1,
        },
        3.2,
      );

      // COUNTER 3: 40%
      var c3 = { val: 0 };
      tl.to(
        c3,
        {
          val: 40,
          duration: 2,
          ease: "power2.out",
          onUpdate: function () {
            (document.getElementById("counter-3") || {}).textContent =
              Math.round(c3.val);
          },
        },
        1.4,
      );
      tl.to(
        "#bar-3",
        { scaleX: 0.4, duration: 2.5, ease: "cubic-bezier(0.16, 1, 0.3, 1)" },
        1.4,
      );
      // ZOOM emphasis
      tl.fromTo(
        "#metric-3",
        { scale: 1 },
        {
          scale: 1.08,
          duration: 0.3,
          ease: "power2.out",
          yoyo: true,
          repeat: 1,
        },
        3.8,
      );

      // Phone section enters with app icons
      tl.fromTo(
        "#phone-section",
        { opacity: 0, x: 80, scale: 0.85 },
        { opacity: 1, x: 0, scale: 1, duration: 0.8, ease: "expo.out" },
        4.5,
      );

      // Phone notifications cascade
      var notifs = ["#notif1", "#notif2", "#notif3", "#notif4"];
      notifs.forEach(function (notif, i) {
        tl.fromTo(
          notif,
          { opacity: 0, x: 30 },
          { opacity: 1, x: 0, duration: 0.4, ease: "power2.out" },
          5.0 + i * 0.6,
        );
      });

      // App icons float in around phone
      var icons = ["#icon-tg", "#icon-wa", "#icon-sl", "#icon-em"];
      icons.forEach(function (icon, i) {
        tl.fromTo(
          icon,
          { opacity: 0, scale: 0.3, y: 20 },
          { opacity: 1, scale: 1, y: 0, duration: 0.5, ease: "back.out(2)" },
          5.5 + i * 0.3,
        );
      });

      // Floating animation for app icons
      icons.forEach(function (icon, i) {
        tl.to(
          icon,
          {
            y: "-=8",
            duration: 1.5 + i * 0.3,
            yoyo: true,
            repeat: 3,
            ease: "sine.inOut",
          },
          6.0 + i * 0.2,
        );
      });

      // Glow pulses on cards
      cards.forEach(function (card, i) {
        tl.to(
          card,
          {
            boxShadow: "0 0 50px rgba(6,182,212,0.2)",
            duration: 1.2,
            yoyo: true,
            repeat: 4,
            ease: "sine.inOut",
          },
          1.5 + i * 0.4,
        );
      });

      // Subtitles
      var subs = [
        { start: 0, end: 1.5, text: "Then it just runs. 24/7." },
        { start: 1.5, end: 5, text: "You cut operating costs by up to 60%" },
        { start: 5, end: 8, text: "You reclaim 20+ hours every week" },
        {
          start: 8,
          end: 12,
          text: "And you check everything from your phone in under 30 minutes",
        },
      ];
      subs.forEach(function (sub) {
        tl.call(
          function () {
            (document.getElementById("subtitle") || {}).textContent = sub.text;
          },
          [],
          sub.start,
        );
        tl.fromTo(
          "#subtitle",
          { opacity: 0 },
          { opacity: 0.9, duration: 0.2 },
          sub.start,
        );
        tl.to("#subtitle", { opacity: 0, duration: 0.2 }, sub.end - 0.2);
      });
      tl.call(
        function () {
          (document.getElementById("subtitle") || {}).textContent = "";
        },
        [],
        beat - 0.5,
      );

      window.__timelines["beat4-scale"] = tl;
    </script>
  </div>
</template>
