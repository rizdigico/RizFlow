<template id="beat5-cta-template">
  <div
    data-composition-id="beat5-cta"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="8.62"
  >
    <style>
      [data-composition-id="beat5-cta"] {
        font-family: "Inter", "Montserrat", sans-serif;
        background: #0a0f1a;
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      [data-composition-id="beat5-cta"] .bg-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 800px;
        height: 800px;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.06) 0%,
          transparent 60%
        );
        z-index: 1;
      }

      [data-composition-id="beat5-cta"] .grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(6, 182, 212, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(6, 182, 212, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 1;
      }

      [data-composition-id="beat5-cta"] .content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        z-index: 5;
      }

      /* Logo */
      [data-composition-id="beat5-cta"] .logo-wrap {
        opacity: 0;
        position: relative;
      }

      [data-composition-id="beat5-cta"] .logo-wrap img {
        width: 120px;
        height: 120px;
      }

      [data-composition-id="beat5-cta"] .logo-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.2) 0%,
          transparent 70%
        );
        z-index: -1;
      }

      /* Tagline */
      [data-composition-id="beat5-cta"] .tagline {
        display: flex;
        gap: 0.18em;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 900px;
      }

      [data-composition-id="beat5-cta"] .tagline-word {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 42px;
        color: #ffffff;
        display: inline-block;
        opacity: 0;
      }

      [data-composition-id="beat5-cta"] .tagline-word.accent {
        color: #22d3ee;
      }

      /* URL */
      [data-composition-id="beat5-cta"] .url-wrap {
        opacity: 0;
        position: relative;
      }

      [data-composition-id="beat5-cta"] .url-text {
        font-family: "Inter", sans-serif;
        font-weight: 700;
        font-size: 52px;
        color: #06b6d4;
        letter-spacing: 0.04em;
      }

      [data-composition-id="beat5-cta"] .url-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 400px;
        height: 60px;
        background: radial-gradient(
          ellipse,
          rgba(6, 182, 212, 0.2) 0%,
          transparent 70%
        );
        z-index: -1;
        border-radius: 50%;
      }

      /* Neural mesh behind (faint) */
      [data-composition-id="beat5-cta"] .mesh-bg {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 400px;
        opacity: 0;
        z-index: 2;
      }

      /* Particle burst from center */
      [data-composition-id="beat5-cta"] .burst-dot {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #22d3ee;
        opacity: 0;
        z-index: 3;
      }
    </style>

    <!-- Background -->
    <div class="bg-glow"></div>
    <div class="grid-overlay"></div>

    <!-- Faint neural mesh -->
    <img
      class="mesh-bg"
      src="../capture/assets/svgs/overflow-visible.svg"
      alt=""
    />

    <!-- Content -->
    <div class="content">
      <div class="logo-wrap" id="logo">
        <div class="logo-glow"></div>
        <img src="../capture/assets/svgs/bg-navy.svg" alt="RizFlow" />
      </div>

      <div class="tagline" id="tagline">
        <span class="tagline-word">Scale</span>
        <span class="tagline-word">your</span>
        <span class="tagline-word">business.</span>
        <span class="tagline-word accent">Not</span>
        <span class="tagline-word">your</span>
        <span class="tagline-word">workload.</span>
      </div>

      <div class="url-wrap" id="url">
        <div class="url-glow"></div>
        <span class="url-text" id="url-text"></span>
      </div>
    </div>

    <!-- Burst dots -->
    <div class="burst-dot" id="bd1"></div>
    <div class="burst-dot" id="bd2"></div>
    <div class="burst-dot" id="bd3"></div>
    <div class="burst-dot" id="bd4"></div>
    <div class="burst-dot" id="bd5"></div>
    <div class="burst-dot" id="bd6"></div>
    <div class="burst-dot" id="bd7"></div>
    <div class="burst-dot" id="bd8"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var beat = 8.62;

      // Logo fades in with scale
      tl.fromTo(
        "#logo",
        { opacity: 0, scale: 0.9 },
        { opacity: 1, scale: 1, duration: 0.5, ease: "power2.out" },
        0.3,
      );

      // Logo glow pulse
      tl.to(
        "#logo .logo-glow",
        {
          scale: 1.2,
          duration: 1.5,
          yoyo: true,
          repeat: 5,
          ease: "sine.inOut",
        },
        0.5,
      );

      // Neural mesh fades in faintly
      tl.fromTo(
        ".mesh-bg",
        { opacity: 0, scale: 0.95 },
        { opacity: 0.12, scale: 1, duration: 1.0, ease: "power2.out" },
        0.5,
      );

      // Tagline — per-word slide+fade
      var tagWords = document.querySelectorAll(
        "[data-composition-id='beat5-cta'] .tagline-word",
      );
      tagWords.forEach(function (word, i) {
        tl.fromTo(
          word,
          { opacity: 0, y: 25 },
          { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
          1.5 + i * 0.18,
        );
      });

      // URL — types on character by character
      var urlStr = "rizflow.co";
      var urlEl = document.getElementById("url-text");
      for (var i = 0; i < urlStr.length; i++) {
        (function (idx) {
          tl.call(
            function () {
              urlEl.textContent = urlStr.substring(0, idx + 1);
            },
            [],
            3.2 + idx * 0.04,
          );
        })(i);
      }

      // URL wrap fade in
      tl.fromTo(
        "#url",
        { opacity: 0 },
        { opacity: 1, duration: 0.3, ease: "power2.out" },
        3.2,
      );

      // URL glow pulse (ongoing)
      tl.to(
        "#url .url-glow",
        {
          scale: 1.3,
          opacity: 0.6,
          duration: 2,
          yoyo: true,
          repeat: 3,
          ease: "sine.inOut",
        },
        3.5,
      );

      // Particle burst from center outward
      var burstDots = [
        "#bd1",
        "#bd2",
        "#bd3",
        "#bd4",
        "#bd5",
        "#bd6",
        "#bd7",
        "#bd8",
      ];
      var angles = [0, 45, 90, 135, 180, 225, 270, 315];
      var rad = Math.PI / 180;
      burstDots.forEach(function (dot, i) {
        var angle = angles[i] * rad;
        var dist = 350 + (i % 3) * 80;
        var endX = Math.cos(angle) * dist;
        var endY = Math.sin(angle) * dist;
        // Set initial position at center
        gsap.set(dot, { left: 960, top: 540 });
        tl.fromTo(
          dot,
          { opacity: 0.8, scale: 1, x: 0, y: 0 },
          {
            opacity: 0,
            scale: 0.3,
            x: endX,
            y: endY,
            duration: 1.2,
            ease: "power2.out",
          },
          4.5 + i * 0.05,
        );
      });

      // Logo subtle breathing
      tl.to(
        "#logo",
        {
          scale: 1.03,
          duration: 2.5,
          yoyo: true,
          repeat: 2,
          ease: "sine.inOut",
        },
        2.0,
      );

      // Tagline subtle float
      tl.to(
        "#tagline",
        { y: "+=4", duration: 2, yoyo: true, repeat: 3, ease: "sine.inOut" },
        2.5,
      );

      window.__timelines["beat5-cta"] = tl;
    </script>
  </div>
</template>
