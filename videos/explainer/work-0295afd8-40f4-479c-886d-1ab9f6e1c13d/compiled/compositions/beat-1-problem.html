<template id="beat1-problem-template">
  <div
    data-composition-id="beat1-problem"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="9.5"
  >
    <style>
      [data-composition-id="beat1-problem"] {
        font-family: "Inter", "Montserrat", sans-serif;
        background: #0a0f1a;
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
      }

      /* Flowing mesh background — animated SVG wave lines */
      [data-composition-id="beat1-problem"] .flow-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        opacity: 0.4;
      }
      [data-composition-id="beat1-problem"] .flow-bg path {
        fill: none;
        stroke: #4fa0b4;
        stroke-width: 1.2;
      }

      /* Background grid overlay */
      [data-composition-id="beat1-problem"] .grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 1;
      }

      /* Radial glow bottom-left */
      [data-composition-id="beat1-problem"] .radial-glow {
        position: absolute;
        bottom: -100px;
        left: -100px;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.08) 0%,
          transparent 70%
        );
        z-index: 1;
      }

      /* Canvas for particles */
      [data-composition-id="beat1-problem"] .particle-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        z-index: 2;
      }

      /* Task info cards — visual demo graphics instead of plain text */
      [data-composition-id="beat1-problem"] .task-card {
        position: absolute;
        width: 340px;
        background: rgba(17, 24, 39, 0.75);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 14px;
        padding: 22px 24px;
        z-index: 3;
        opacity: 0;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      }

      [data-composition-id="beat1-problem"] .task-card-icon {
        font-size: 32px;
        margin-bottom: 8px;
      }

      [data-composition-id="beat1-problem"] .task-card-title {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 22px;
        color: #ffffff;
        letter-spacing: 0.1em;
        text-transform: uppercase;

      }

      [data-composition-id="beat1-problem"] .task-card-detail {

        font-size: 14px;

      }

      [data-composition-id="beat1-problem"] .task-card-bar-track {

        background: rgba(255, 255, 255, 0.06);
        border-radius: 3px;
        overflow: hidden;
      }

      [data-composition-id="beat1-problem"] .task-card-bar-fill {
        height: 100%;
        border-radius: 3px;
        background: linear-gradient(90deg, #06b6d4, #22d3ee);

      [data-composition-id="beat1-problem"] .task-card-time {
        font-family: "Inter", sans-serif;
        font-weight: 700;
        font-size: 13px;
        color: #f59e0b;
        margin-top: 6px;
        font-variant-numeric: tabular-nums;
      }

      [data-composition-id="beat1-problem"] #card-invoicing {
        top: 120px;
        left: 80px;
      }
      [data-composition-id="beat1-problem"] #card-scheduling {
        top: 360px;
        left: 320px;
      }
      [data-composition-id="beat1-problem"] #card-followups {
        top: 180px;
        right: 100px;
      }
      [data-composition-id="beat1-problem"] #card-paperwork {
        top: 440px;
        right: 200px;
      }

      /* "Sound familiar?" — centered in screen */
      [data-composition-id="beat1-problem"] .sound-familiar {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 4;
        text-align: center;
        opacity: 0;
      }

      [data-composition-id="beat1-problem"] .sound-familiar-text {
        font-family: "Montserrat", sans-serif;

      [data-composition-id="beat1-problem"] .sound-familiar-question {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 72px;
        color: #ffffff;
        letter-spacing: 0.02em;

      }

      /* Dim overlay for "Sound familiar?" reveal */
      [data-composition-id="beat1-problem"] .dim-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(10, 15, 26, 0.7);
        z-index: 3;
        opacity: 0;
        pointer-events: none;
      }

      /* Hours counter in bottom-right */
      [data-composition-id="beat1-problem"] .hours-counter {
        position: absolute;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 4;
        opacity: 0;
        text-align: center;
      }

      [data-composition-id="beat1-problem"] .hours-number {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 56px;
        color: #f59e0b;
        letter-spacing: 0.03em;
      }

      [data-composition-id="beat1-problem"] .hours-label {
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 16px;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      [data-composition-id="beat1-problem"] .hours-plus {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 32px;
        color: #f59e0b;
        vertical-align: super;
        line-height: 1;
      }

      /* Screen shake effect on card impacts */
      [data-composition-id="beat1-problem"] .shake-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      /* Glitch scan line overlay */
      [data-composition-id="beat1-problem"] .glitch-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
        pointer-events: none;
        opacity: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(6, 182, 212, 0.03) 2px,
          rgba(6, 182, 212, 0.03) 4px
        );
      }

      /* Urgency pulse — amber warning border */
      [data-composition-id="beat1-problem"] .urgency-ring {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 3px solid transparent;
        z-index: 6;
        pointer-events: none;
        box-sizing: border-box;
      }

      /* Floating em-dash accent particles */
      [data-composition-id="beat1-problem"] .accent-line {
        position: absolute;
        height: 2px;
        background: linear-gradient(90deg, transparent, #06b6d4, transparent);
        opacity: 0;
        z-index: 2;
      }
      [data-composition-id="beat1-problem"] .accent-line-1 {
        top: 300px;
        left: 0;
        width: 300px;
      }
      [data-composition-id="beat1-problem"] .accent-line-2 {
        top: 600px;
        right: 0;
        width: 250px;
      }
      [data-composition-id="beat1-problem"] .accent-line-3 {
        bottom: 200px;
        left: 50%;
        width: 400px;
      }
    </style>

    <!-- Background layers -->
    <div class="shake-layer" id="shake-layer">
      <svg
        class="flow-bg"
        viewBox="0 0 1920 1080"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M0 200 Q 240 120, 480 200 T 960 200 T 1440 200 T 1920 200"
          opacity="0.15"
        />
        <path
          d="M0 350 Q 300 280, 600 350 T 1200 350 T 1920 350"
          opacity="0.2"
        />
        <path
          d="M0 500 Q 200 440, 400 500 T 800 500 T 1200 500 T 1600 500 T 1920 500"
          opacity="0.12"
        />
        <path
          d="M0 650 Q 360 580, 720 650 T 1440 650 T 1920 650"
          opacity="0.18"
        />
        <path
          d="M0 800 Q 280 730, 560 800 T 1120 800 T 1920 800"
          opacity="0.1"
        />
        <path d="M0 950 Q 400 890, 800 950 T 1920 950" opacity="0.08" />
      </svg>
      <div class="grid-overlay"></div>
      <div class="radial-glow"></div>
    </div>
    <div class="glitch-overlay" id="glitch-overlay"></div>
    <div class="urgency-ring" id="urgency-ring"></div>
    <div class="accent-line accent-line-1" id="aline-1"></div>
    <div class="accent-line accent-line-2" id="aline-2"></div>
    <div class="accent-line accent-line-3" id="aline-3"></div>
    <canvas
      class="particle-canvas"
      id="beat1-canvas"
      width="1920"
      height="1080"
    ></canvas>

    <!-- Task info cards with icons, details, and progress bars -->
    <div class="task-card" id="card-invoicing">
      <div class="task-card-icon">📄</div>
      <div class="task-card-title">Invoicing</div>
      <div class="task-card-detail">
        Manual data entry, follow-ups on unpaid invoices, reconciling
        payments...
      </div>
      <div class="task-card-bar-track">
        <div class="task-card-bar-fill" id="bar-invoicing"></div>
      </div>
      <div class="task-card-time">⏱ 3.5 hrs/wk</div>
    </div>

    <div class="task-card" id="card-scheduling">
      <div class="task-card-icon">📅</div>
      <div class="task-card-title">Scheduling</div>
      <div class="task-card-detail">
        Back-and-forth emails, calendar conflicts, rescheduling...
      </div>
      <div class="task-card-bar-track">
        <div class="task-card-bar-fill" id="bar-scheduling"></div>
      </div>
      <div class="task-card-time">⏱ 4.2 hrs/wk</div>
    </div>

    <div class="task-card" id="card-followups">
      <div class="task-card-icon">💬</div>
      <div class="task-card-title">Client Follow-ups</div>
      <div class="task-card-detail">
        Checking in, sending reminders, updating CRM records...
      </div>
      <div class="task-card-bar-track">
        <div class="task-card-bar-fill" id="bar-followups"></div>
      </div>
      <div class="task-card-time">⏱ 3.8 hrs/wk</div>
    </div>

    <div class="task-card" id="card-paperwork">
      <div class="task-card-icon">📋</div>
      <div class="task-card-title">Paperwork</div>
      <div class="task-card-detail">
        Filing, compliance docs, contracts, reports...
      </div>
      <div class="task-card-bar-track">
        <div class="task-card-bar-fill" id="bar-paperwork"></div>
      </div>
      <div class="task-card-time">⏱ 3.0 hrs/wk</div>
    </div>

    <!-- Dim overlay for "Sound familiar?" reveal -->
    <div class="dim-overlay" id="dim-overlay"></div>

    <!-- "Sound familiar?" centered in screen -->
    <div class="sound-familiar" id="sound-familiar">
      <span class="sound-familiar-text">Sound</span>
      <span class="sound-familiar-question">familiar?</span>
    </div>

    <!-- Hours counter -->
    <div class="hours-counter" id="hours-counter">
      <div>
        <span class="hours-number" id="hours-num">0</span
        ><span class="hours-plus">+</span>
      </div>
      <div class="hours-label">hours saved every week</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var beat = 9.5;

      // Deterministic hash for particles
      function hash(x, y) {
        var n = x * 374761393 + y * 668265263;
        n = (n ^ (n >> 13)) * 1274126177;
        return ((n ^ (n >> 16)) & 0x7fffffff) / 0x7fffffff;
      }

      // Canvas 2D particle field
      var canvas = document.getElementById("beat1-canvas");
      var ctx = canvas.getContext("2d");
      var proxy = { t: 0 };

      function drawParticles(time) {
        ctx.clearRect(0, 0, 1920, 1080);
        var count = 80;
        for (var i = 0; i < count; i++) {
          var bx = hash(i, 0) * 1920;
          var by = hash(i, 1) * 1080;
          var dx = Math.sin(time * 0.3 + i * 0.7) * 15;
          var dy = Math.cos(time * 0.25 + i * 0.5) * 10;
          var x = bx + dx;
          var y = by + dy;
          var alpha = 0.15 + hash(i, 2) * 0.15;
          var r = 1 + hash(i, 3) * 1.5;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(6, 182, 212, " + alpha + ")";
          ctx.fill();
          if (i > 0 && hash(i, 4) > 0.6) {
            var pi = Math.floor(hash(i, 5) * i);
            var px = hash(pi, 0) * 1920 + Math.sin(time * 0.3 + pi * 0.7) * 15;
            var py = hash(pi, 1) * 1080 + Math.cos(time * 0.25 + pi * 0.5) * 10;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(px, py);
            ctx.strokeStyle = "rgba(6, 182, 212, 0.06)";
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      tl.to(
        proxy,
        {
          t: beat,
          duration: beat,
          ease: "none",
          onUpdate: function () {
            drawParticles(proxy.t);
          },
        },
        0,
      );

      // Flow background wave animation
      var flowPaths = document.querySelectorAll(
        "[data-composition-id='beat1-problem'] .flow-bg path",
      );
      flowPaths.forEach(function (path, i) {
        tl.fromTo(
          path,
          { strokeDasharray: 2000, strokeDashoffset: 2000 },
          { strokeDashoffset: 0, duration: 4, ease: "none" },
          i * 0.3,
        );
      });

      // Task card entrances — staggered slam-in with visual info
      tl.fromTo(
        "#card-invoicing",
        { x: -300, rotation: -3, opacity: 0, scale: 0.9 },
        {
          x: 0,
          rotation: 0,
          opacity: 1,
          scale: 1,
          duration: 0.5,
          ease: "power3.out",
        },
        0.8,
      );
      tl.fromTo(
        "#bar-invoicing",
        { scaleX: 0 },
        { scaleX: 0.75, duration: 0.4, ease: "power2.in" },
        1.1,
      );

      tl.fromTo(
        "#card-scheduling",
        { y: -150, opacity: 0, scale: 0.9 },
        { y: 0, opacity: 1, scale: 1, duration: 0.5, ease: "power3.out" },
        1.8,
      );
      tl.fromTo(
        "#bar-scheduling",
        { scaleX: 0 },
        { scaleX: 0.6, duration: 0.4, ease: "power2.in" },
        2.1,
      );

      tl.fromTo(
        "#card-followups",
        { x: 300, rotation: 2, opacity: 0, scale: 0.9 },
        {
          x: 0,
          rotation: 0,
          opacity: 1,
          scale: 1,
          duration: 0.5,
          ease: "power3.out",
        },
        2.8,
      );
      tl.fromTo(
        "#bar-followups",
        { scaleX: 0 },
        { scaleX: 0.65, duration: 0.4, ease: "power2.in" },
        3.1,
      );

      tl.fromTo(
        "#card-paperwork",
        { y: 100, x: 150, opacity: 0, scale: 0.9 },
        { y: 0, x: 0, opacity: 1, scale: 1, duration: 0.5, ease: "power3.out" },
        3.8,
      );
      tl.fromTo(
        "#bar-paperwork",
        { scaleX: 0 },
        { scaleX: 0.5, duration: 0.4, ease: "power2.in" },
        4.1,
      );

      // Card subtle float
      [
        "#card-invoicing",
        "#card-scheduling",
        "#card-followups",
        "#card-paperwork",
      ].forEach(function (card, i) {
        tl.to(
          card,
          {
            y: "+=4",
            duration: 1.8 + i * 0.3,
            yoyo: true,
            repeat: 2,
            ease: "sine.inOut",
          },
          2.0 + i * 0.5,
        );
      });

      // Screen shake on each card impact
      [
        "#card-invoicing",
        "#card-scheduling",
        "#card-followups",
        "#card-paperwork",
      ].forEach(function (card, i) {
        var t = 0.8 + i * 1.0;
        tl.to("#shake-layer", { x: 6, duration: 0.05, ease: "none" }, t);
        tl.to(
          "#shake-layer",
          { x: -4, duration: 0.05, ease: "none" },
          t + 0.05,
        );
        tl.to("#shake-layer", { x: 2, duration: 0.05, ease: "none" }, t + 0.1);
        tl.to("#shake-layer", { x: 0, duration: 0.05, ease: "none" }, t + 0.15);
      });

      // Glitch overlay flashes
      [1.0, 2.0, 3.0, 4.0].forEach(function (t) {
        tl.to("#glitch-overlay", { opacity: 0.3, duration: 0.05 }, t);
        tl.to("#glitch-overlay", { opacity: 0, duration: 0.1 }, t + 0.05);
      });

      // Accent lines sweep in
      tl.fromTo(
        "#aline-1",
        { scaleX: 0, opacity: 0 },
        { scaleX: 1, opacity: 0.4, duration: 0.6, ease: "power2.out" },
        1.5,
      );
      tl.fromTo(
        "#aline-2",
        { scaleX: 0, opacity: 0 },
        { scaleX: 1, opacity: 0.3, duration: 0.5, ease: "power2.out" },
        2.8,
      );
      tl.fromTo(
        "#aline-3",
        { scaleX: 0, opacity: 0 },
        { scaleX: 1, opacity: 0.35, duration: 0.7, ease: "power2.out" },
        4.2,
      );

      // Urgency ring pulse (amber warning)
      [3.5, 5.0, 6.5].forEach(function (t) {
        tl.to(
          "#urgency-ring",
          { borderColor: "rgba(245,158,11,0.3)", duration: 0.2 },
          t,
        );
        tl.to(
          "#urgency-ring",
          { borderColor: "transparent", duration: 0.5 },
          t + 0.2,
        );
      });

      // Card flash on bar fill
      [
        "#card-invoicing",
        "#card-scheduling",
        "#card-followups",
        "#card-paperwork",
      ].forEach(function (card, i) {
        tl.to(
          card,
          { boxShadow: "0 0 30px rgba(245,158,11,0.3)", duration: 0.15 },
          1.1 + i * 1.0,
        );
        tl.to(
          card,
          { boxShadow: "0 0 20px rgba(0,0,0,0.3)", duration: 0.4 },
          1.25 + i * 1.0,
        );
      });

      // Hours counter — counts up to 20
      var hoursCounter = { val: 0 };
      tl.fromTo(
        "#hours-counter",
        { opacity: 0 },
        { opacity: 1, duration: 0.4, ease: "power2.out" },
        4.5,
      );
      tl.to(
        hoursCounter,
        {
          val: 20,
          duration: 1.5,
          ease: "power2.out",
          onUpdate: function () {
            document.getElementById("hours-num").textContent = Math.round(
              hoursCounter.val,
            );
          },
        },
        4.6,
      );

      // Dim overlay appears — cards recede
      tl.to(
        "#dim-overlay",
        { opacity: 1, duration: 0.5, ease: "power2.inOut" },
        6.0,
      );

      // "Sound familiar?" — centered reveal
      tl.fromTo(
        "#sound-familiar",
        { opacity: 0, scale: 0.85, y: 30 },
        { opacity: 1, scale: 1, y: 0, duration: 0.8, ease: "expo.out" },
        6.3,
      );

      // Glow pulse on "Sound familiar?"
      tl.to(
        "#sound-familiar",
        {
          textShadow: "0 0 60px rgba(34,211,238,0.5)",
          duration: 0.6,
          yoyo: true,
          repeat: 3,
          ease: "sine.inOut",
        },
        7.0,
      );

      window.__timelines["beat1-problem"] = tl;
    </script>
  </div>
</template>
