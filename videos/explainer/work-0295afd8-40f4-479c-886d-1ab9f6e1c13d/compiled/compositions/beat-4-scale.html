<template id="beat4-scale-template">
  <div
    data-composition-id="beat4-scale"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="11.5"
  >
    <style>
      [data-composition-id="beat4-scale"] {
        font-family: "Inter", "Montserrat", sans-serif;
        background: #0a0f1a;
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
      }

      /* Flowing mesh background */
      [data-composition-id="beat4-scale"] .flow-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        opacity: 0.3;
      }
      [data-composition-id="beat4-scale"] .flow-bg path {
        fill: none;
        stroke: #4fa0b4;
        stroke-width: 1.2;
      }

      [data-composition-id="beat4-scale"] .grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(6, 182, 212, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(6, 182, 212, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 1;
      }

      [data-composition-id="beat4-scale"] .radial-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1000px;
        height: 1000px;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.08) 0%,
          transparent 65%
        );
        z-index: 1;
      }

      /* Particle canvas */
      [data-composition-id="beat4-scale"] .particle-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        z-index: 2;
      }

      /* Decorative pulse dots */
      [data-composition-id="beat4-scale"] .pulse-dot {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #06b6d4;
        z-index: 2;
        opacity: 0;
      }
      [data-composition-id="beat4-scale"] .pulse-dot-1 {
        top: 120px;
        left: 160px;
      }
      [data-composition-id="beat4-scale"] .pulse-dot-2 {
        bottom: 200px;
        right: 180px;
      }
      [data-composition-id="beat4-scale"] .pulse-dot-3 {
        top: 400px;
        right: 120px;
      }
      [data-composition-id="beat4-scale"] .pulse-dot-4 {
        bottom: 350px;
        left: 220px;
      }
      [data-composition-id="beat4-scale"] .pulse-dot-5 {
        top: 250px;
        left: 90px;
      }

      /* Metric cards */
      [data-composition-id="beat4-scale"] .metrics-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        gap: 36px;
        z-index: 4;
        width: 1050px;
      }

      [data-composition-id="beat4-scale"] .metric-card {
        display: flex;
        align-items: center;
        gap: 30px;
        background: rgba(17, 24, 39, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 32px 40px;
        box-shadow:
          0 0 30px rgba(6, 182, 212, 0.08),
          0 0 60px rgba(6, 182, 212, 0.04);
        opacity: 0;
      }

      [data-composition-id="beat4-scale"] .metric-icon {
        font-size: 40px;
        min-width: 56px;
        text-align: center;
      }

      [data-composition-id="beat4-scale"] .metric-value {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 76px;
        color: #ffffff;
        min-width: 180px;
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }

      [data-composition-id="beat4-scale"] .metric-value .pct {
        font-size: 44px;
        color: #22d3ee;
      }

      [data-composition-id="beat4-scale"] .metric-value .unit {
        font-size: 28px;
        color: #94a3b8;
        font-weight: 600;
      }

      [data-composition-id="beat4-scale"] .metric-info {
        flex: 1;
      }

      [data-composition-id="beat4-scale"] .metric-label {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 22px;
        color: #ffffff;
        margin-bottom: 8px;
        letter-spacing: 0.04em;
      }

      [data-composition-id="beat4-scale"] .metric-desc {
        font-family: "Inter", sans-serif;
        font-weight: 400;
        font-size: 16px;
        color: #94a3b8;
        line-height: 1.4;
      }

      [data-composition-id="beat4-scale"] .metric-bar-track {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 4px;
        margin-top: 14px;
        overflow: hidden;
      }

      [data-composition-id="beat4-scale"] .metric-bar-fill {
        height: 100%;
        border-radius: 4px;
        transform-origin: left center;
        transform: scaleX(0);
        position: relative;
      }

      [data-composition-id="beat4-scale"] .metric-bar-fill::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 40%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        animation: shimmer 2s linear infinite;
      }

      [data-composition-id="beat4-scale"] .bar-teal {
        background: linear-gradient(90deg, #06b6d4, #22d3ee);
      }
      [data-composition-id="beat4-scale"] .bar-emerald {
        background: linear-gradient(90deg, #10b981, #34d399);
      }
      [data-composition-id="beat4-scale"] .bar-gold {
        background: linear-gradient(90deg, #f59e0b, #fbbf24);
      }

      /* Bottom tagline */
      [data-composition-id="beat4-scale"] .tagline {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        display: flex;
        gap: 0.45em;
      }

      [data-composition-id="beat4-scale"] .tagline-word {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 34px;
        color: #ffffff;
        display: inline-block;
        opacity: 0;
      }

      [data-composition-id="beat4-scale"] .tagline-word.accent {
        color: #22d3ee;
      }

      @keyframes shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(300%);
        }
      }

      /* Data pulse lines */
      [data-composition-id="beat4-scale"] .data-pulse {
        position: absolute;
        height: 1px;
        background: linear-gradient(90deg, transparent, #06b6d4, transparent);
        opacity: 0;
        z-index: 3;
      }
      [data-composition-id="beat4-scale"] .dp-1 {
        top: 25%;
        left: 0;
        width: 1920px;
      }
      [data-composition-id="beat4-scale"] .dp-2 {
        top: 50%;
        left: 0;
        width: 1920px;
      }
      [data-composition-id="beat4-scale"] .dp-3 {
        top: 75%;
        left: 0;
        width: 1920px;
      }

      /* Metric card impact flash */
      [data-composition-id="beat4-scale"] .metric-card-flash {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          135deg,
          rgba(6, 182, 212, 0.1),
          transparent
        );
        border-radius: 20px;
        opacity: 0;
        z-index: 1;
      }
    </style>

    <!-- Background layers -->
    <svg
      class="flow-bg"
      viewBox="0 0 1920 1080"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M0 200 Q 240 120, 480 200 T 960 200 T 1440 200 T 1920 200"
        opacity="0.15"
      />
      <path d="M0 380 Q 300 310, 600 380 T 1200 380 T 1920 380" opacity="0.2" />
      <path
        d="M0 540 Q 200 470, 400 540 T 800 540 T 1200 540 T 1920 540"
        opacity="0.12"
      />
      <path
        d="M0 700 Q 360 630, 720 700 T 1440 700 T 1920 700"
        opacity="0.18"
      />
      <path d="M0 880 Q 280 820, 560 880 T 1120 880 T 1920 880" opacity="0.1" />
    </svg>
    <div class="grid-overlay"></div>
    <div class="radial-glow"></div>
    <canvas
      class="particle-canvas"
      id="beat4-canvas"
      width="1920"
      height="1080"
    ></canvas>

    <!-- Decorative pulse dots -->
    <div class="pulse-dot pulse-dot-1"></div>
    <div class="pulse-dot pulse-dot-2"></div>
    <div class="pulse-dot pulse-dot-3"></div>
    <div class="pulse-dot pulse-dot-4"></div>
    <div class="pulse-dot pulse-dot-5"></div>

    <!-- Data pulse lines -->
    <div class="data-pulse dp-1" id="dp1"></div>
    <div class="data-pulse dp-2" id="dp2"></div>
    <div class="data-pulse dp-3" id="dp3"></div>

    <!-- Metric cards -->
    <div class="metrics-container">
      <div class="metric-card" id="metric-1">
        <div class="metric-icon">💰</div>
        <div class="metric-value">
          <span id="counter-1">0</span><span class="pct">%</span>
        </div>
        <div class="metric-info">
          <div class="metric-label">Operating Costs Cut</div>
          <div class="metric-desc">
            AI agents handle admin, comms, billing — 24/7
          </div>
          <div class="metric-bar-track">
            <div class="metric-bar-fill bar-teal" id="bar-1"></div>
          </div>
        </div>
      </div>

      <div class="metric-card" id="metric-2">
        <div class="metric-icon">⏱️</div>
        <div class="metric-value">
          <span id="counter-2">0</span><span class="unit">+ hrs</span>
        </div>
        <div class="metric-info">
          <div class="metric-label">Weekly Hours Reclaimed</div>
          <div class="metric-desc">
            Check everything from your phone in under 30 minutes
          </div>
          <div class="metric-bar-track">
            <div class="metric-bar-fill bar-emerald" id="bar-2"></div>
          </div>
        </div>
      </div>

      <div class="metric-card" id="metric-3">
        <div class="metric-icon">📈</div>
        <div class="metric-value">
          <span id="counter-3">0</span><span class="pct">%</span>
        </div>
        <div class="metric-info">
          <div class="metric-label">Revenue Growth</div>
          <div class="metric-desc">Scale your business, not your workload</div>
          <div class="metric-bar-track">
            <div class="metric-bar-fill bar-gold" id="bar-3"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom tagline -->
    <div class="tagline">
      <span class="tagline-word">Scale</span>
      <span class="tagline-word">your</span>
      <span class="tagline-word">business.</span>
      <span class="tagline-word accent">Not</span>
      <span class="tagline-word">your</span>
      <span class="tagline-word">workload.</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var beat = 11.5;

      // Deterministic hash for particles
      function hash(x, y) {
        var n = x * 374761393 + y * 668265263;
        n = (n ^ (n >> 13)) * 1274126177;
        return ((n ^ (n >> 16)) & 0x7fffffff) / 0x7fffffff;
      }

      // Canvas 2D — bright neural network (fully formed)
      var canvas4 = document.getElementById("beat4-canvas");
      var ctx4 = canvas4.getContext("2d");
      var proxy4 = { t: 0 };

      function drawNetwork(time) {
        ctx4.clearRect(0, 0, 1920, 1080);
        var nodes = 90;
        var positions = [];
        for (var i = 0; i < nodes; i++) {
          var bx = hash(i, 0) * 1920;
          var by = hash(i, 1) * 1080;
          var dx = Math.sin(time * 0.2 + i * 1.3) * 20;
          var dy = Math.cos(time * 0.15 + i * 0.9) * 15;
          var x = bx + dx;
          var y = by + dy;
          positions.push({ x: x, y: y });
          var alpha = 0.3 + hash(i, 2) * 0.4;
          var r = 2 + hash(i, 3) * 2.5;
          ctx4.beginPath();
          ctx4.arc(x, y, r, 0, Math.PI * 2);
          ctx4.fillStyle = "rgba(6, 182, 212, " + alpha + ")";
          ctx4.fill();
          ctx4.beginPath();
          ctx4.arc(x, y, r * 2.5, 0, Math.PI * 2);
          ctx4.fillStyle = "rgba(6, 182, 212, " + alpha * 0.15 + ")";
          ctx4.fill();
        }
        for (var i = 0; i < nodes; i++) {
          for (var j = i + 1; j < nodes; j++) {
            var dist = Math.sqrt(
              Math.pow(positions[i].x - positions[j].x, 2) +
                Math.pow(positions[i].y - positions[j].y, 2),
            );
            if (dist < 180) {
              var lineAlpha = (1 - dist / 180) * 0.12;
              ctx4.beginPath();
              ctx4.moveTo(positions[i].x, positions[i].y);
              ctx4.lineTo(positions[j].x, positions[j].y);
              ctx4.strokeStyle = "rgba(6, 182, 212, " + lineAlpha + ")";
              ctx4.lineWidth = 0.6;
              ctx4.stroke();
            }
          }
        }
      }

      tl.to(
        proxy4,
        {
          t: beat,
          duration: beat,
          ease: "none",
          onUpdate: function () {
            drawNetwork(proxy4.t);
          },
        },
        0,
      );

      // Flow background wave animation
      var flowPaths = document.querySelectorAll(
        "[data-composition-id='beat4-scale'] .flow-bg path",
      );
      flowPaths.forEach(function (path, i) {
        tl.fromTo(
          path,
          { strokeDasharray: 2000, strokeDashoffset: 2000 },
          { strokeDashoffset: 0, duration: 5, ease: "none" },
          i * 0.25,
        );
      });

      // Metric cards cascade in
      var cards = ["#metric-1", "#metric-2", "#metric-3"];
      cards.forEach(function (card, i) {
        tl.fromTo(
          card,
          { opacity: 0, y: 60, scale: 0.95 },
          { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "expo.out" },
          0.5 + i * 0.4,
        );
      });

      // Counter 1: 60%
      var c1 = { val: 0 };
      tl.to(
        c1,
        {
          val: 60,
          duration: 2,
          ease: "power2.out",
          onUpdate: function () {
            document.getElementById("counter-1").textContent = Math.round(
              c1.val,
            );
          },
        },
        0.8,
      );
      tl.to(
        "#bar-1",
        { scaleX: 0.6, duration: 2.5, ease: "cubic-bezier(0.16, 1, 0.3, 1)" },
        0.8,
      );

      // Counter 2: 20+ hrs
      var c2 = { val: 0 };
      tl.to(
        c2,
        {
          val: 20,
          duration: 2,
          ease: "power2.out",
          onUpdate: function () {
            document.getElementById("counter-2").textContent = Math.round(
              c2.val,
            );
          },
        },
        1.2,
      );
      tl.to(
        "#bar-2",
        { scaleX: 0.8, duration: 2.5, ease: "cubic-bezier(0.16, 1, 0.3, 1)" },
        1.2,
      );

      // Counter 3: 40%
      var c3 = { val: 0 };
      tl.to(
        c3,
        {
          val: 40,
          duration: 2,
          ease: "power2.out",
          onUpdate: function () {
            document.getElementById("counter-3").textContent = Math.round(
              c3.val,
            );
          },
        },
        1.6,
      );
      tl.to(
        "#bar-3",
        { scaleX: 0.4, duration: 2.5, ease: "cubic-bezier(0.16, 1, 0.3, 1)" },
        1.6,
      );

      // Glow pulse on each card
      cards.forEach(function (card, i) {
        tl.to(
          card,
          {
            boxShadow: "0 0 40px rgba(6,182,212,0.15)",
            duration: 1.2,
            yoyo: true,
            repeat: 4,
            ease: "sine.inOut",
          },
          1.5 + i * 0.4,
        );
      });

      // Subtle float
      cards.forEach(function (card, i) {
        tl.to(
          card,
          {
            y: "+=4",
            duration: 2.5,
            yoyo: true,
            repeat: 3,
            ease: "sine.inOut",
          },
          2.0 + i * 0.2,
        );
      });

      // Decorative pulse dots entrance
      tl.fromTo(
        ".pulse-dot",
        { opacity: 0, scale: 0 },
        {
          opacity: 0.6,
          scale: 1,
          duration: 0.3,
          stagger: 0.08,
          ease: "back.out(2)",
        },
        0.3,
      );
      var dots = [
        ".pulse-dot-1",
        ".pulse-dot-2",
        ".pulse-dot-3",
        ".pulse-dot-4",
        ".pulse-dot-5",
      ];
      dots.forEach(function (dot, i) {
        tl.to(
          dot,
          {
            y: "+=" + (5 + i * 1.5),
            duration: 2 + i * 0.2,
            yoyo: true,
            repeat: 4,
            ease: "sine.inOut",
          },
          0.8 + i * 0.2,
        );
        tl.to(
          dot,
          {
            opacity: 0.9,
            duration: 0.6,
            yoyo: true,
            repeat: 5,
            ease: "sine.inOut",
          },
          1.0 + i * 0.3,
        );
      });

      // Bottom tagline — per-word entrance
      var tagWords = document.querySelectorAll(
        "[data-composition-id='beat4-scale'] .tagline-word",
      );
      tagWords.forEach(function (word, i) {
        tl.fromTo(
          word,
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" },
          7.5 + i * 0.2,
        );
      });

      // Tagline glow
      tl.to(
        "[data-composition-id='beat4-scale'] .tagline",
        {
          textShadow: "0 0 30px rgba(34,211,238,0.4)",
          duration: 0.8,
          yoyo: true,
          repeat: 3,
          ease: "sine.inOut",
        },
        8.5,
      );

      // Data pulse lines — horizontal sweeps at metric reveals
      ["#dp1", "#dp2", "#dp3"].forEach(function (dp, i) {
        tl.fromTo(
          dp,
          { scaleX: 0, opacity: 0.6 },
          { scaleX: 1, opacity: 0, duration: 0.8, ease: "power2.out" },
          0.5 + i * 0.4,
        );
      });

      // Metric card micro-shake on counter hit
      cards.forEach(function (card, i) {
        var hitTime = 0.8 + i * 0.4 + 2.0;
        tl.to(card, { x: 4, duration: 0.04, ease: "none" }, hitTime);
        tl.to(card, { x: -2, duration: 0.04, ease: "none" }, hitTime + 0.04);
        tl.to(card, { x: 0, duration: 0.04, ease: "none" }, hitTime + 0.08);
      });

      // Bar fill glow bursts
      ["#bar-1", "#bar-2", "#bar-3"].forEach(function (bar, i) {
        tl.to(
          bar,
          { filter: "brightness(1.5)", duration: 0.15 },
          0.8 + i * 0.4 + 2.0,
        );
        tl.to(
          bar,
          { filter: "brightness(1)", duration: 0.3 },
          0.8 + i * 0.4 + 2.15,
        );
      });

      window.__timelines["beat4-scale"] = tl;
    </script>
  </div>
</template>
