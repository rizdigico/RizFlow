<template id="beat5-cta-template">
  <div
    data-composition-id="beat5-cta"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="7.6"
  >
    <style>
      [data-composition-id="beat5-cta"] {
        font-family: "Inter", "Montserrat", sans-serif;
        background: #0a0f1a;
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      /* Flowing mesh background */
      [data-composition-id="beat5-cta"] .flow-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        opacity: 0.25;
      }
      [data-composition-id="beat5-cta"] .flow-bg path {
        fill: none;
        stroke: #4fa0b4;
        stroke-width: 1.2;
      }

      [data-composition-id="beat5-cta"] .grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(6, 182, 212, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(6, 182, 212, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 1;
      }

      [data-composition-id="beat5-cta"] .bg-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 900px;
        height: 900px;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.1) 0%,
          transparent 60%
        );
        z-index: 1;
      }

      [data-composition-id="beat5-cta"] .content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        z-index: 5;
      }

      /* Logo */
      [data-composition-id="beat5-cta"] .logo-wrap {
        opacity: 0;
        position: relative;
      }

      [data-composition-id="beat5-cta"] .logo-wrap img {
        width: 140px;
        height: 140px;
        object-fit: contain;
      }

      [data-composition-id="beat5-cta"] .logo-svg {
        width: 140px;
        height: 140px;
      }

      [data-composition-id="beat5-cta"] .logo-icon-bg {
        fill: #0a1e33;
        rx: 28;
      }

      [data-composition-id="beat5-cta"] .logo-bolt {
        fill: #22d3ee;
      }

      [data-composition-id="beat5-cta"] .logo-bolt-glow {
        fill: none;
        stroke: #06b6d4;
        stroke-width: 1.5;
        filter: url(#logoGlow);
      }

      [data-composition-id="beat5-cta"] .logo-text {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 22px;
        fill: #ffffff;
        letter-spacing: 0.12em;
      }

      [data-composition-id="beat5-cta"] .logo-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 240px;
        height: 240px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.25) 0%,
          transparent 70%
        );
        z-index: -1;
      }

      [data-composition-id="beat5-cta"] .logo-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 180px;
        height: 180px;
        border-radius: 50%;
        border: 2px solid rgba(6, 182, 212, 0.15);
        z-index: -1;
        opacity: 0;
      }

      /* Tagline */
      [data-composition-id="beat5-cta"] .tagline {
        display: flex;
        gap: 0.45em;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 900px;
      }

      [data-composition-id="beat5-cta"] .tagline-word {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 44px;
        color: #ffffff;
        display: inline-block;
        opacity: 0;
      }

      [data-composition-id="beat5-cta"] .tagline-word.accent {
        color: #22d3ee;
      }

      /* URL */
      [data-composition-id="beat5-cta"] .url-wrap {
        opacity: 0;
        position: relative;
      }

      [data-composition-id="beat5-cta"] .url-text {
        font-family: "Inter", sans-serif;
        font-weight: 700;
        font-size: 56px;
        color: #06b6d4;
        letter-spacing: 0.04em;
      }

      [data-composition-id="beat5-cta"] .url-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 400px;
        height: 60px;
        background: radial-gradient(
          ellipse,
          rgba(6, 182, 212, 0.25) 0%,
          transparent 70%
        );
        z-index: -1;
        border-radius: 50%;
      }

      /* Particle burst from center */
      [data-composition-id="beat5-cta"] .burst-dot {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #22d3ee;
        opacity: 0;
        z-index: 3;
      }

      /* Impact flash on logo reveal */
      [data-composition-id="beat5-cta"] .impact-flash {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.15) 0%,
          transparent 70%
        );
        border-radius: 50%;
        z-index: 2;
        opacity: 0;
      }

      /* Teal accent line under tagline */
      [data-composition-id="beat5-cta"] .accent-line-cta {
        position: absolute;
        bottom: 45%;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 2px;
        background: linear-gradient(90deg, transparent, #06b6d4, transparent);
        opacity: 0;
        z-index: 5;
      }

      /* Decorative pulse dots */
      [data-composition-id="beat5-cta"] .pulse-dot {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #06b6d4;
        z-index: 2;
        opacity: 0;
      }
      [data-composition-id="beat5-cta"] .pulse-dot-1 {
        top: 180px;
        left: 200px;
      }
      [data-composition-id="beat5-cta"] .pulse-dot-2 {
        bottom: 250px;
        right: 250px;
      }
      [data-composition-id="beat5-cta"] .pulse-dot-3 {
        top: 350px;
        right: 150px;
      }
      [data-composition-id="beat5-cta"] .pulse-dot-4 {
        bottom: 400px;
        left: 300px;
      }
    </style>

    <!-- Background layers -->
    <svg
      class="flow-bg"
      viewBox="0 0 1920 1080"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M0 200 Q 240 120, 480 200 T 960 200 T 1440 200 T 1920 200"
        opacity="0.15"
      />
      <path d="M0 400 Q 300 330, 600 400 T 1200 400 T 1920 400" opacity="0.2" />
      <path
        d="M0 600 Q 200 540, 400 600 T 800 600 T 1200 600 T 1920 600"
        opacity="0.12"
      />
      <path
        d="M0 800 Q 360 730, 720 800 T 1440 800 T 1920 800"
        opacity="0.18"
      />
    </svg>
    <div class="grid-overlay"></div>
    <div class="bg-glow"></div>

    <!-- Decorative pulse dots -->
    <div class="pulse-dot pulse-dot-1"></div>
    <div class="pulse-dot pulse-dot-2"></div>
    <div class="pulse-dot pulse-dot-3"></div>
    <div class="pulse-dot pulse-dot-4"></div>

    <!-- Content -->
    <div class="content">
      <div class="logo-wrap" id="logo">
        <div class="logo-glow"></div>
        <div class="logo-ring" id="logo-ring"></div>
        <svg
          class="logo-svg"
          viewBox="0 0 140 160"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
          </defs>
          <rect
            class="logo-icon-bg"
            x="5"
            y="5"
            width="130"
            height="130"
            rx="28"
          />
          <path
            class="logo-bolt"
            d="M78 28l-30 48h22l-14 44 38-50H72l18-42H78z"
            transform="translate(0,8)"
          />
          <path
            class="logo-bolt-glow"
            d="M78 28l-30 48h22l-14 44 38-50H72l18-42H78z"
            transform="translate(0,8)"
          />
          <text class="logo-text" x="70" y="155" text-anchor="middle">
            RIZFLOW
          </text>
        </svg>
      </div>

      <div class="accent-line-cta" id="accent-line-cta"></div>

      <div class="tagline" id="tagline">
        <span class="tagline-word">Scale</span>
        <span class="tagline-word">your</span>
        <span class="tagline-word">business.</span>
        <span class="tagline-word accent">Not</span>
        <span class="tagline-word">your</span>
        <span class="tagline-word">workload.</span>
      </div>

      <div class="url-wrap" id="url">
        <div class="url-glow"></div>
        <span class="url-text" id="url-text"></span>
      </div>
    </div>

    <!-- Burst dots -->
    <div class="burst-dot" id="bd1"></div>
    <div class="burst-dot" id="bd2"></div>
    <div class="burst-dot" id="bd3"></div>
    <div class="burst-dot" id="bd4"></div>
    <div class="burst-dot" id="bd5"></div>
    <div class="burst-dot" id="bd6"></div>
    <div class="burst-dot" id="bd7"></div>
    <div class="burst-dot" id="bd8"></div>

    <!-- Impact flash -->
    <div class="impact-flash" id="impact-flash"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var beat = 7.6;

      // Flow background wave animation
      var flowPaths = document.querySelectorAll(
        "[data-composition-id='beat5-cta'] .flow-bg path",
      );
      flowPaths.forEach(function (path, i) {
        tl.fromTo(
          path,
          { strokeDasharray: 2000, strokeDashoffset: 2000 },
          { strokeDashoffset: 0, duration: 4, ease: "none" },
          i * 0.2,
        );
      });

      // Logo fades in with scale — more dramatic
      tl.fromTo(
        "#logo",
        { opacity: 0, scale: 0.5, filter: "blur(12px)" },
        {
          opacity: 1,
          scale: 1,
          filter: "blur(0px)",
          duration: 0.9,
          ease: "expo.out",
        },
        0.2,
      );

      // Impact flash on logo reveal
      tl.fromTo(
        "#impact-flash",
        { opacity: 0.8, scale: 0.3 },
        { opacity: 0, scale: 2, duration: 0.6, ease: "power2.out" },
        0.5,
      );

      // Logo ring expands
      tl.fromTo(
        "#logo-ring",
        { opacity: 0, scale: 0.5 },
        { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.5)" },
        0.5,
      );

      // Logo glow pulse
      tl.to(
        "#logo .logo-glow",
        {
          scale: 1.3,
          duration: 1.5,
          yoyo: true,
          repeat: 3,
          ease: "sine.inOut",
        },
        0.5,
      );

      // Logo ring rotation
      tl.to(
        "#logo-ring",
        { rotation: 360, duration: 20, ease: "none", repeat: -1 },
        0.5,
      );

      // Decorative pulse dots entrance
      tl.fromTo(
        ".pulse-dot",
        { opacity: 0, scale: 0 },
        {
          opacity: 0.5,
          scale: 1,
          duration: 0.3,
          stagger: 0.08,
          ease: "back.out(2)",
        },
        0.3,
      );
      var pdots = [
        ".pulse-dot-1",
        ".pulse-dot-2",
        ".pulse-dot-3",
        ".pulse-dot-4",
      ];
      pdots.forEach(function (dot, i) {
        tl.to(
          dot,
          {
            y: "+=" + (5 + i * 1.5),
            duration: 1.5 + i * 0.2,
            yoyo: true,
            repeat: 3,
            ease: "sine.inOut",
          },
          0.6 + i * 0.2,
        );
        tl.to(
          dot,
          {
            opacity: 0.8,
            duration: 0.5,
            yoyo: true,
            repeat: 4,
            ease: "sine.inOut",
          },
          0.8 + i * 0.2,
        );
      });

      // Tagline — per-word slide+fade with more impact
      var tagWords = document.querySelectorAll(
        "[data-composition-id='beat5-cta'] .tagline-word",
      );
      tagWords.forEach(function (word, i) {
        tl.fromTo(
          word,
          { opacity: 0, y: 30, scale: 0.9 },
          { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "back.out(1.5)" },
          1.8 + i * 0.2,
        );
      });

      // Accent line under tagline
      tl.fromTo(
        "#accent-line-cta",
        { scaleX: 0, opacity: 0 },
        { scaleX: 1, opacity: 0.5, duration: 0.6, ease: "power2.out" },
        3.0,
      );

      // URL — types on character by character
      var urlStr = "rizflow.co";
      var urlEl = document.getElementById("url-text");
      for (var i = 0; i < urlStr.length; i++) {
        (function (idx) {
          tl.call(
            function () {
              urlEl.textContent = urlStr.substring(0, idx + 1);
            },
            [],
            3.2 + idx * 0.04,
          );
        })(i);
      }

      // URL wrap fade in
      tl.fromTo(
        "#url",
        { opacity: 0 },
        { opacity: 1, duration: 0.3, ease: "power2.out" },
        3.2,
      );

      // URL glow pulse
      tl.to(
        "#url .url-glow",
        {
          scale: 1.3,
          opacity: 0.7,
          duration: 2,
          yoyo: true,
          repeat: 2,
          ease: "sine.inOut",
        },
        3.5,
      );

      // Particle burst from center outward
      var burstDots = [
        "#bd1",
        "#bd2",
        "#bd3",
        "#bd4",
        "#bd5",
        "#bd6",
        "#bd7",
        "#bd8",
      ];
      var angles = [0, 45, 90, 135, 180, 225, 270, 315];
      var rad = Math.PI / 180;
      burstDots.forEach(function (dot, i) {
        var angle = angles[i] * rad;
        var dist = 350 + (i % 3) * 80;
        var endX = Math.cos(angle) * dist;
        var endY = Math.sin(angle) * dist;
        gsap.set(dot, { left: 960, top: 540 });
        tl.fromTo(
          dot,
          { opacity: 0.8, scale: 1, x: 0, y: 0 },
          {
            opacity: 0,
            scale: 0.3,
            x: endX,
            y: endY,
            duration: 1.2,
            ease: "power2.out",
          },
          4.5 + i * 0.05,
        );
      });

      // Logo subtle breathing
      tl.to(
        "#logo",
        {
          scale: 1.03,
          duration: 2.5,
          yoyo: true,
          repeat: 2,
          ease: "sine.inOut",
        },
        2.0,
      );

      // Tagline subtle float
      tl.to(
        "#tagline",
        { y: "+=4", duration: 2, yoyo: true, repeat: 2, ease: "sine.inOut" },
        2.5,
      );

      window.__timelines["beat5-cta"] = tl;
    </script>
  </div>
</template>
