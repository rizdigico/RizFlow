    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var beat = 8.5;

      // Flow background animation
      var flowPaths = document.querySelectorAll(
        "[data-composition-id='beat3-deploy'] .flow-bg path",
      );
      flowPaths.forEach(function (path, i) {
        tl.fromTo(
          path,
          { strokeDasharray: 2000, strokeDashoffset: 2000 },
          { strokeDashoffset: 0, duration: 5, ease: "none" },
          i * 0.2,
        );
      });

      // Orchestrator hub — scales in with glow
      tl.fromTo(
        "#orchestrator",
        { opacity: 0, scale: 0.3 },
        { opacity: 1, scale: 1, duration: 0.6, ease: "elastic.out(1, 0.5)" },
        0.1,
      );
      tl.fromTo(
        "#orch-ring",
        { opacity: 0 },
        { opacity: 1, duration: 0.3, ease: "power2.out" },
        0.3,
      );
      tl.fromTo(
        "#orch-ring2",
        { opacity: 0 },
        { opacity: 0.5, duration: 0.4, ease: "power2.out" },
        0.5,
      );

      // Pulse rings emanate from orchestrator
      tl.fromTo(
        "#pring1",
        { opacity: 0.6, scale: 1 },
        { opacity: 0, scale: 2.5, duration: 1.5, ease: "power2.out" },
        0.5,
      );
      tl.fromTo(
        "#pring2",
        { opacity: 0.4, scale: 1 },
        { opacity: 0, scale: 3, duration: 2, ease: "power2.out" },
        1.0,
      );
      tl.fromTo(
        "#pring3",
        { opacity: 0.3, scale: 1 },
        { opacity: 0, scale: 4, duration: 2.5, ease: "power2.out" },
        1.5,
      );

      // Agent circles scale in (staggered)
      var agents = [".agent-1", ".agent-2", ".agent-3", ".agent-4"];
      agents.forEach(function (agent, i) {
        tl.fromTo(
          agent,
          { opacity: 0, scale: 0.3 },
          { opacity: 1, scale: 1, duration: 0.4, ease: "elastic.out(1, 0.6)" },
          0.5 + i * 0.12,
        );
      });

      // Tool nodes slide in from right (staggered)
      var tools = [".tool-1", ".tool-2", ".tool-3", ".tool-4", ".tool-5"];
      tools.forEach(function (tool, i) {
        tl.fromTo(
          tool,
          { opacity: 0, x: 60 },
          { opacity: 1, x: 0, duration: 0.35, ease: "power2.out" },
          0.8 + i * 0.1,
        );
      });

      // Connection paths draw themselves
      var pathGroups = [
        ["#path-a1", "#path-a2", "#path-a3", "#path-a4"],
        ["#path-t1", "#path-t2", "#path-t3", "#path-t4", "#path-t5"],
      ];
      pathGroups.forEach(function (group) {
        group.forEach(function (path, i) {
          tl.to(
            path,
            { strokeDashoffset: 0, duration: 0.6, ease: "power2.out" },
            1.0 + i * 0.12,
          );
        });
      });

      // Traveling dots along paths
      var travelDots = [
        "#td1",
        "#td2",
        "#td3",
        "#td4",
        "#td5",
        "#td6",
        "#td7",
        "#td8",
      ];
      var dotPaths = [
        "#path-a1",
        "#path-a2",
        "#path-a3",
        "#path-a4",
        "#path-t1",
        "#path-t2",
        "#path-t3",
        "#path-t4",
      ];
      travelDots.forEach(function (dot, i) {
        tl.fromTo(
          dot,
          { opacity: 0.8 },
          { opacity: 0, duration: 1.5, ease: "power2.in" },
          2.0 + i * 0.3,
        );
        var pathEl = document.querySelector(dotPaths[i]);
        if (pathEl && pathEl.getTotalLength) {
          var len = pathEl.getTotalLength();
          tl.fromTo(
            dot,
            { opacity: 0.9, x: 0, y: 0 },
            {
              motionPath: {
                path: dotPaths[i],
                align: dotPaths[i],
                alignOrigin: [0.5, 0.5],
              },
              opacity: 0,
              duration: 1.5,
              ease: "power2.inOut",
            },
            2.0 + i * 0.3,
          );
        }
      });
