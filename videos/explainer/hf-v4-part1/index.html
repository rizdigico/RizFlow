<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #scene1 {
        z-index: 1;
      }
      #scene2 {
        z-index: 2;
        opacity: 0;
      }
      #scene3 {
        z-index: 3;
        opacity: 0;
      }
      #scene4 {
        z-index: 4;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="36"
    >
      <!-- Beat 1: THE PROBLEM (0 - 8s) -->
      <div
        id="scene1"
        class="scene"
        data-composition-id="beat1-problem"
        data-composition-src="compositions/beat-1-problem.html"
        data-start="0"
        data-duration="8"
        data-track-index="1"
      ></div>

      <!-- Beat 2: DISCOVER (8 - 15s) -->
      <div
        id="scene2"
        class="scene"
        data-composition-id="beat2-discover"
        data-composition-src="compositions/beat-2-discover.html"
        data-start="8"
        data-duration="7"
        data-track-index="1"
      ></div>

      <!-- Beat 3: BUILD & DEPLOY (15 - 23.5s) -->
      <div
        id="scene3"
        class="scene"
        data-composition-id="beat3-deploy"
        data-composition-src="compositions/beat-3-deploy.html"
        data-start="15"
        data-duration="8.5"
        data-track-index="1"
      ></div>

      <!-- Beat 4: SCALE/IMPACT (23.5 - 35.5s) -->
      <div
        id="scene4"
        class="scene"
        data-composition-id="beat4-scale"
        data-composition-src="compositions/beat-4-scale.html"
        data-start="23.5"
        data-duration="12"
        data-track-index="1"
      ></div>

      <!-- Part 1 audio (0-36s) -->
      <audio
        id="narration"
        src="assets/mixed-audio-v4.wav"
        data-start="0"
        data-duration="36"
        data-track-index="0"
        data-volume="1"
      ></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      // Transition 1→2: Blur crossfade at 7.7s
      var t1 = 7.7;
      tl.to(
        "#scene1",
        { filter: "blur(20px)", opacity: 0, duration: 0.3, ease: "power3.in" },
        t1,
      );
      tl.fromTo(
        "#scene2",
        { opacity: 0, filter: "blur(20px)", scale: 0.75 },
        {
          opacity: 1,
          filter: "blur(0px)",
          scale: 1,
          duration: 0.5,
          ease: "expo.out",
        },
        t1 + 0.1,
      );

      // Transition 2→3: Upward slide at 14.7s
      var t2 = 14.7;
      tl.to(
        "#scene2",
        {
          y: -150,
          filter: "blur(30px)",
          opacity: 0,
          duration: 0.33,
          ease: "power2.in",
        },
        t2,
      );
      tl.fromTo(
        "#scene3",
        { y: 150, filter: "blur(30px)", opacity: 0 },
        {
          y: 0,
          filter: "blur(0px)",
          opacity: 1,
          duration: 1.0,
          ease: "power2.out",
        },
        t2,
      );

      // Transition 3→4: Whip pan left at 23.2s
      var t3 = 23.2;
      tl.to(
        "#scene3",
        {
          x: -400,
          filter: "blur(24px)",
          opacity: 0.4,
          duration: 0.3,
          ease: "power3.in",
        },
        t3,
      );
      tl.fromTo(
        "#scene4",
        { x: 400, filter: "blur(24px)", opacity: 0 },
        {
          x: 0,
          filter: "blur(0px)",
          opacity: 1,
          duration: 0.3,
          ease: "power3.out",
        },
        t3 + 0.15,
      );

      // Transition 4→5 start: fade out scene 4 at 35.2s
      var t4 = 35.2;
      tl.to(
        "#scene4",
        {
          scale: 1.15,
          filter: "blur(16px)",
          opacity: 0,
          duration: 0.4,
          ease: "power3.in",
        },
        t4,
      );

      // Hard kills
      tl.set("#scene1", { visibility: "hidden" }, 8.2);
      tl.set("#scene2", { visibility: "hidden" }, 15.2);
      tl.set("#scene3", { visibility: "hidden" }, 23.7);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
