<template id="beat6-casestudy-template">
  <div
    data-composition-id="beat6-casestudy"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="15"
  >
    <style>
      [data-composition-id="beat6-casestudy"] {
        font-family: "Inter", "Montserrat", sans-serif;
        background: #0a0f1a;
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
      }
      [data-composition-id="beat6-casestudy"] .flow-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        opacity: 0.5;
      }
      [data-composition-id="beat6-casestudy"] .flow-bg path {
        fill: none;
        stroke: #4fa0b4;
        stroke-width: 1.8;
      }
      [data-composition-id="beat6-casestudy"] .grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(6, 182, 212, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(6, 182, 212, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 1;
      }
      [data-composition-id="beat6-casestudy"] .radial-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1400px;
        height: 1400px;
        background: radial-gradient(
          circle,
          rgba(16, 185, 129, 0.12) 0%,
          rgba(6, 182, 212, 0.08) 40%,
          transparent 60%
        );
        z-index: 1;
      }
      [data-composition-id="beat6-casestudy"] .particle-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        z-index: 2;
      }

      /* Case study label */
      [data-composition-id="beat6-casestudy"] .case-label {
        position: absolute;
        top: 60px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        opacity: 0;
      }
      [data-composition-id="beat6-casestudy"] .case-label-text {
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 14px;
        color: #10b981;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.3);
        padding: 6px 18px;
        border-radius: 20px;
      }

      /* Client name */
      [data-composition-id="beat6-casestudy"] .client-name {
        position: absolute;
        top: 140px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        opacity: 0;
        text-align: center;
      }
      [data-composition-id="beat6-casestudy"] .client-logo {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 56px;
        color: #ffffff;
        letter-spacing: 0.06em;
      }
      [data-composition-id="beat6-casestudy"] .client-type {
        font-family: "Inter", sans-serif;
        font-weight: 400;
        font-size: 18px;
        color: #94a3b8;
        margin-top: 8px;
      }

      /* Result cards */
      [data-composition-id="beat6-casestudy"] .results-grid {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -30%);
        display: flex;
        gap: 40px;
        z-index: 5;
      }
      [data-composition-id="beat6-casestudy"] .result-card {
        background: rgba(17, 24, 39, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(16, 185, 129, 0.15);
        border-radius: 20px;
        padding: 32px 28px;
        text-align: center;
        min-width: 280px;
        opacity: 0;
        box-shadow: 0 0 30px rgba(16, 185, 129, 0.08);
      }
      [data-composition-id="beat6-casestudy"] .result-icon {
        font-size: 32px;
        margin-bottom: 12px;
      }
      [data-composition-id="beat6-casestudy"] .result-value {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 56px;
        color: #ffffff;
        line-height: 1;
      }
      [data-composition-id="beat6-casestudy"] .result-value .pct {
        font-size: 32px;
        color: #10b981;
      }
      [data-composition-id="beat6-casestudy"] .result-label {
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 15px;
        color: #94a3b8;
        margin-top: 8px;
        letter-spacing: 0.04em;
      }
      [data-composition-id="beat6-casestudy"] .result-bar-track {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 3px;
        margin-top: 14px;
        overflow: hidden;
      }
      [data-composition-id="beat6-casestudy"] .result-bar-fill {
        height: 100%;
        border-radius: 3px;
        transform-origin: left center;
        transform: scaleX(0);
      }
      .bar-emerald2 {
        background: linear-gradient(90deg, #10b981, #34d399);
      }
      .bar-cyan2 {
        background: linear-gradient(90deg, #06b6d4, #22d3ee);
      }

      /* Quote */
      [data-composition-id="beat6-casestudy"] .quote-text {
        position: absolute;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        opacity: 0;
        font-family: "Inter", sans-serif;
        font-weight: 400;
        font-size: 20px;
        color: #94a3b8;
        font-style: italic;
        text-align: center;
        max-width: 800px;
      }
      [data-composition-id="beat6-casestudy"] .quote-mark {
        font-size: 48px;
        color: #10b981;
        line-height: 0.5;
      }

      /* Subtitle */
      [data-composition-id="beat6-casestudy"] .subtitle {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-family: "Inter", sans-serif;
        font-weight: 500;
        font-size: 24px;
        color: #ffffff;
        text-align: center;
        opacity: 0;
        background: rgba(10, 15, 26, 0.75);
        padding: 6px 18px;
        border-radius: 6px;
        max-width: 1600px;
      }
    </style>

    <svg
      class="flow-bg"
      viewBox="0 0 1920 1080"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M0 200 Q 240 120, 480 200 T 960 200 T 1440 200 T 1920 200"
        opacity="0.35"
      />
      <path d="M0 400 Q 300 330, 600 400 T 1200 400 T 1920 400" opacity="0.4" />
      <path
        d="M0 600 Q 200 540, 400 600 T 800 600 T 1200 600 T 1920 600"
        opacity="0.3"
      />
      <path
        d="M0 800 Q 360 730, 720 800 T 1440 800 T 1920 800"
        opacity="0.35"
      />
    </svg>
    <div class="grid-overlay"></div>
    <div class="radial-glow"></div>
    <canvas
      class="particle-canvas"
      id="beat6-canvas"
      width="1920"
      height="1080"
    ></canvas>

    <!-- Case study label -->
    <div class="case-label" id="case-label">
      <span class="case-label-text">&#x2B50; CASE STUDY</span>
    </div>

    <!-- Client name -->
    <div class="client-name" id="client-name">
      <div class="client-logo">RainFresh</div>
      <div class="client-type">E-Commerce Brand</div>
    </div>

    <!-- Result cards -->
    <div class="results-grid" id="results">
      <div class="result-card" id="res1">
        <div class="result-icon">&#x26A1;</div>
        <div class="result-value">
          <span id="rc1">0</span><span class="pct">%</span>
        </div>
        <div class="result-label">FASTER ORDER PROCESSING</div>
        <div class="result-bar-track">
          <div class="result-bar-fill bar-emerald2" id="rbar1"></div>
        </div>
      </div>
      <div class="result-card" id="res2">
        <div class="result-icon">&#x2705;</div>
        <div class="result-value" style="color: #34d399">ZERO</div>
        <div class="result-label">STOCKOUTS</div>
        <div class="result-bar-track">
          <div
            class="result-bar-fill bar-cyan2"
            style="background: linear-gradient(90deg, #06b6d4, #22d3ee)"
            id="rbar2"
          ></div>
        </div>
      </div>
      <div class="result-card" id="res3">
        <div class="result-icon">&#x1F4B0;</div>
        <div class="result-value">
          <span id="rc3">0</span><span class="pct">%</span>
        </div>
        <div class="result-label">COST REDUCTION</div>
        <div class="result-bar-track">
          <div class="result-bar-fill bar-emerald2" id="rbar3"></div>
        </div>
      </div>
    </div>

    <!-- Quote -->
    <div class="quote-text" id="quote">
      <div class="quote-mark">&#x201C;</div>
      <div>Real client. Real results.</div>
    </div>

    <div class="subtitle" id="subtitle"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var beat = 15;

      // Canvas
      var canvas = document.getElementById("beat6-canvas");
      var ctx = canvas.getContext("2d");
      var proxy = { t: 0 };
      function hash(x, y) {
        var n = x * 374761393 + y * 668265263;
        n = (n ^ (n >> 13)) * 1274126177;
        return ((n ^ (n >> 16)) & 0x7fffffff) / 0x7fffffff;
      }
      function drawNetwork(time) {
        ctx.clearRect(0, 0, 1920, 1080);
        var nodes = 70,
          positions = [];
        for (var i = 0; i < nodes; i++) {
          var bx = hash(i, 0) * 1920,
            by = hash(i, 1) * 1080;
          var dx = Math.sin(time * 0.2 + i * 1.3) * 18,
            dy = Math.cos(time * 0.16 + i * 0.9) * 13;
          var x = bx + dx,
            y = by + dy;
          positions.push({ x: x, y: y });
          var alpha = 0.25 + hash(i, 2) * 0.35,
            r = 2 + hash(i, 3) * 2;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(16, 185, 129, " + alpha + ")";
          ctx.fill();
          ctx.beginPath();
          ctx.arc(x, y, r * 2, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(16, 185, 129, " + alpha * 0.15 + ")";
          ctx.fill();
        }
        for (var i = 0; i < nodes; i++) {
          for (var j = i + 1; j < nodes; j++) {
            var dist = Math.sqrt(
              Math.pow(positions[i].x - positions[j].x, 2) +
                Math.pow(positions[i].y - positions[j].y, 2),
            );
            if (dist < 170) {
              var lineAlpha = (1 - dist / 170) * 0.1;
              ctx.beginPath();
              ctx.moveTo(positions[i].x, positions[i].y);
              ctx.lineTo(positions[j].x, positions[j].y);
              ctx.strokeStyle = "rgba(16, 185, 129, " + lineAlpha + ")";
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
      }
      tl.to(
        proxy,
        {
          t: beat,
          duration: beat,
          ease: "none",
          onUpdate: function () {
            drawNetwork(proxy.t);
          },
        },
        0,
      );

      // Flow
      var flowPaths = document.querySelectorAll(
        "[data-composition-id='beat6-casestudy'] .flow-bg path",
      );
      flowPaths.forEach(function (path, i) {
        tl.fromTo(
          path,
          { strokeDasharray: 3000, strokeDashoffset: 3000 },
          { strokeDashoffset: 0, duration: 7, ease: "none" },
          i * 0.2,
        );
      });

      // Case label
      tl.fromTo(
        "#case-label",
        { opacity: 0, y: -20 },
        { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" },
        0.3,
      );

      // Client name
      tl.fromTo(
        "#client-name",
        { opacity: 0, scale: 0.9, filter: "blur(10px)" },
        {
          opacity: 1,
          scale: 1,
          filter: "blur(0px)",
          duration: 0.7,
          ease: "expo.out",
        },
        0.6,
      );

      // Result cards
      tl.fromTo(
        "#res1",
        { opacity: 0, x: -60 },
        { opacity: 1, x: 0, duration: 0.6, ease: "expo.out" },
        2.0,
      );
      tl.fromTo(
        "#res2",
        { opacity: 0, y: -40 },
        { opacity: 1, y: 0, duration: 0.6, ease: "expo.out" },
        2.3,
      );
      tl.fromTo(
        "#res3",
        { opacity: 0, x: 60 },
        { opacity: 1, x: 0, duration: 0.6, ease: "expo.out" },
        2.6,
      );

      // Counters
      var c1 = { val: 0 };
      tl.to(
        c1,
        {
          val: 70,
          duration: 2,
          ease: "power2.out",
          onUpdate: function () {
            (document.getElementById("rc1") || {}).textContent = Math.round(
              c1.val,
            );
          },
        },
        2.2,
      );
      tl.to(
        "#rbar1",
        { scaleX: 0.7, duration: 2.5, ease: "cubic-bezier(0.16, 1, 0.3, 1)" },
        2.2,
      );

      tl.to(
        "#rbar2",
        { scaleX: 1, duration: 2, ease: "cubic-bezier(0.16, 1, 0.3, 1)" },
        2.5,
      );

      var c3 = { val: 0 };
      tl.to(
        c3,
        {
          val: 60,
          duration: 2,
          ease: "power2.out",
          onUpdate: function () {
            (document.getElementById("rc3") || {}).textContent = Math.round(
              c3.val,
            );
          },
        },
        2.8,
      );
      tl.to(
        "#rbar3",
        { scaleX: 0.6, duration: 2.5, ease: "cubic-bezier(0.16, 1, 0.3, 1)" },
        2.8,
      );

      // ZOOM emphasis on first card
      tl.fromTo(
        "#res1",
        { scale: 1 },
        {
          scale: 1.06,
          duration: 0.3,
          ease: "power2.out",
          yoyo: true,
          repeat: 1,
        },
        4.2,
      );

      // Quote
      tl.fromTo(
        "#quote",
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" },
        5.0,
      );

      // Card glow pulses
      ["#res1", "#res2", "#res3"].forEach(function (card, i) {
        tl.to(
          card,
          {
            boxShadow: "0 0 40px rgba(16,185,129,0.15)",
            duration: 1.2,
            yoyo: true,
            repeat: 3,
            ease: "sine.inOut",
          },
          3.0 + i * 0.3,
        );
      });

      // Subtitles
      var subs = [
        { start: 0, end: 3.5, text: "Don't just take our word for it" },
        {
          start: 3.5,
          end: 7,
          text: "RainFresh, an e-commerce brand, came to us buried in manual orders",
        },
        {
          start: 7,
          end: 10.5,
          text: "Within weeks, our agents cut their order processing time by 70%",
        },
        { start: 10.5, end: 14, text: "and eliminated stockouts entirely" },
        { start: 14, end: 15, text: "Real client, real results" },
      ];
      subs.forEach(function (sub) {
        tl.call(
          function () {
            (document.getElementById("subtitle") || {}).textContent = sub.text;
          },
          [],
          sub.start,
        );
        tl.fromTo(
          "#subtitle",
          { opacity: 0 },
          { opacity: 0.9, duration: 0.2 },
          sub.start,
        );
        tl.to("#subtitle", { opacity: 0, duration: 0.2 }, sub.end - 0.2);
      });
      tl.call(
        function () {
          (document.getElementById("subtitle") || {}).textContent = "";
        },
        [],
        beat - 0.5,
      );

      window.__timelines["beat6-casestudy"] = tl;
    </script>
  </div>
</template>
